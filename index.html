<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出车审批</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.header{background:#1a1a2e;color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:600}
.nav{display:flex;gap:2px;height:100%}
.nav button{background:none;border:none;color:#8888a8;padding:0 14px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.nav button.active{color:#4fc3f7;border-bottom:2px solid #4fc3f7}
.user-info{display:flex;align-items:center;gap:8px;font-size:12px;color:#b0b0c0}
.badge{background:#4fc3f7;color:#1a1a2e;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600}
.main{padding:20px;max-width:1400px;margin:0 auto}
.card{background:#fff;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e8e8ec}
.card-header{padding:14px 18px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.card-header h2{font-size:15px;font-weight:600}
.card-body{padding:18px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:6px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e8e8ec}
.stat-card .n{font-size:26px;font-weight:700}
.stat-card .l{font-size:12px;color:#888}
table{width:100%;border-collapse:collapse}
th{background:#fafafa;padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:#666;border-bottom:2px solid #e8e8ec;white-space:nowrap}
td{padding:9px 12px;font-size:13px;border-bottom:1px solid #f0f0f0}
tr:hover{background:#fafcff}
.tag{display:inline-block;padding:3px 9px;border-radius:3px;font-size:11px;font-weight:600}
.tag-pending{background:#fff3e0;color:#e65100}
.tag-ok{background:#e8f5e9;color:#2e7d32}
.tag-no{background:#fce4ec;color:#c62828}
.tag-blue{background:#e3f2fd;color:#1565c0}
.tag-purple{background:#f3e5f5;color:#6a1b9a}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;font-family:inherit;white-space:nowrap}
.btn-b{background:#1976d2;color:#fff}
.btn-b:hover{background:#1565c0}
.btn-g{background:#388e3c;color:#fff}
.btn-r{background:#d32f2f;color:#fff}
.btn-o{background:#fff;color:#555;border-color:#ddd}
.btn-o:hover{background:#f5f5f5}
.btn-xs{padding:3px 7px;font-size:11px}
form{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;font-weight:500;color:#555}
.fg input,.fg select,.fg textarea{padding:8px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#1976d2}
.fa{grid-column:1/-1;display:flex;gap:8px;padding-top:4px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px}
.dg .di{display:flex;flex-direction:column;gap:1px}
.dg .dl{font-size:11px;color:#888}
.dg .dv{font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
.modal-header{padding:14px 18px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff}
.modal-header h3{font-size:14px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;color:#999;font-size:18px;padding:2px 6px}
.modal-close:hover{color:#333;background:#f0f0f0}
.modal-body{padding:18px}
.empty{text-align:center;padding:50px 20px;color:#999;font-size:14px}
.toast{position:fixed;top:16px;right:16px;z-index:300;padding:10px 18px;border-radius:5px;color:#fff;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideIn .3s ease}
.toast-ok{background:#2e7d32}
.toast-err{background:#c62828}
.toast-info{background:#1565c0}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px;font-family:inherit}
.set-sec{margin-top:16px}
.set-sec h3{font-size:14px;font-weight:600;margin-bottom:10px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.login-overlay{position:fixed;inset:0;background:#1a1a2e;z-index:500;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:8px;padding:36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h2{font-size:20px;margin-bottom:6px}
.login-box .sub{color:#888;font-size:13px;margin-bottom:20px}
.login-box .fg{margin-bottom:14px}
.login-box .fg label{display:block;margin-bottom:4px}
.login-box .fg select,.login-box .fg input{width:100%}
.settings-dropdown{position:relative}
.dropdown-menu{display:none;position:absolute;top:100%;right:0;background:#fff;border:1px solid #ddd;border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,.1);min-width:140px;z-index:150;padding:4px 0;margin-top:4px}
.dm-item{display:flex;align-items:center;gap:8px;width:100%;padding:9px 14px;border:none;background:none;cursor:pointer;font-size:12px;color:#333;font-family:inherit;text-align:left}
.dm-item:hover{background:#f5f5f5}
.dm-divider{border-top:1px solid #eee}
@media(max-width:768px){.two-col{grid-template-columns:1fr}form{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}.header{padding:0 10px}.nav button{padding:0 8px;font-size:11px}.main{padding:10px}}
</style>
</head>
<body>
<div id="app">Loading...</div>
<script src="app.js"></script>
</body>
</html>
