<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出车审批</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.header{background:#1a1a2e;color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:600}
.nav{display:flex;gap:2px;height:100%}
.nav button{background:none;border:none;color:#8888a8;padding:0 14px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.nav button.active{color:#4fc3f7;border-bottom:2px solid #4fc3f7}
.user-info{display:flex;align-items:center;gap:8px;font-size:12px;color:#b0b0c0}
.badge{background:#4fc3f7;color:#1a1a2e;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600}
.main{padding:20px;max-width:1400px;margin:0 auto}
.card{background:#fff;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e8e8ec}
.card-header{padding:14px 18px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.card-header h2{font-size:15px;font-weight:600}
.card-body{padding:18px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:6px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e8e8ec}
.stat-card .n{font-size:26px;font-weight:700}
.stat-card .l{font-size:12px;color:#888}
table{width:100%;border-collapse:collapse}
th{background:#fafafa;padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:#666;border-bottom:2px solid #e8e8ec;white-space:nowrap}
td{padding:9px 12px;font-size:13px;border-bottom:1px solid #f0f0f0}
tr:hover{background:#fafcff}
.tag{display:inline-block;padding:3px 9px;border-radius:3px;font-size:11px;font-weight:600}
.tag-pending{background:#fff3e0;color:#e65100}
.tag-ok{background:#e8f5e9;color:#2e7d32}
.tag-no{background:#fce4ec;color:#c62828}
.tag-blue{background:#e3f2fd;color:#1565c0}
.tag-purple{background:#f3e5f5;color:#6a1b9a}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;font-family:inherit;white-space:nowrap}
.btn-b{background:#1976d2;color:#fff}
.btn-b:hover{background:#1565c0}
.btn-g{background:#388e3c;color:#fff}
.btn-r{background:#d32f2f;color:#fff}
.btn-o{background:#fff;color:#555;border-color:#ddd}
.btn-o:hover{background:#f5f5f5}
.btn-xs{padding:3px 7px;font-size:11px}
form{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;font-weight:500;color:#555}
.fg input,.fg select,.fg textarea{padding:8px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#1976d2}
.fa{grid-column:1/-1;display:flex;gap:8px;padding-top:4px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px}
.dg .di{display:flex;flex-direction:column;gap:1px}
.dg .dl{font-size:11px;color:#888}
.dg .dv{font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
.modal-header{padding:14px 18px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff}
.modal-header h3{font-size:14px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;color:#999;font-size:18px;padding:2px 6px}
.modal-close:hover{color:#333;background:#f0f0f0}
.modal-body{padding:18px}
.empty{text-align:center;padding:50px 20px;color:#999;font-size:14px}
.toast{position:fixed;top:16px;right:16px;z-index:300;padding:10px 18px;border-radius:5px;color:#fff;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideIn .3s ease}
.toast-ok{background:#2e7d32}
.toast-err{background:#c62828}
.toast-info{background:#1565c0}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px;font-family:inherit}
.set-sec{margin-top:16px}
.set-sec h3{font-size:14px;font-weight:600;margin-bottom:10px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.login-overlay{position:fixed;inset:0;background:#1a1a2e;z-index:500;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:8px;padding:36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h2{font-size:20px;margin-bottom:6px}
.login-box .sub{color:#888;font-size:13px;margin-bottom:20px}
.login-box .fg{margin-bottom:14px}
.login-box .fg label{display:block;margin-bottom:4px}
.login-box .fg select,.login-box .fg input{width:100%}
.settings-dropdown{position:relative}
.dropdown-menu{display:none;position:absolute;top:100%;right:0;background:#fff;border:1px solid #ddd;border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,.1);min-width:140px;z-index:150;padding:4px 0;margin-top:4px}
.dm-item{display:flex;align-items:center;gap:8px;width:100%;padding:9px 14px;border:none;background:none;cursor:pointer;font-size:12px;color:#333;font-family:inherit;text-align:left}
.dm-item:hover{background:#f5f5f5}
.dm-divider{border-top:1px solid #eee}
@media(max-width:768px){.two-col{grid-template-columns:1fr}form{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}.header{padding:0 10px}.nav button{padding:0 8px;font-size:11px}.main{padding:10px}}
</style>
</head>
<body>
<div id="app">Loading...</div>
<script>
﻿var CONFIG={githubOwner:"xiaoyun12345",githubRepo:"vehicle-dispatch-app",githubToken:localStorage.getItem("github_token")||"",dataPath:"data.json",apiBase:"https://api.github.com"};
var GitHubAPI={_sha:null,readData:function(){var s=this;return fetch(CONFIG.apiBase+"/repos/"+CONFIG.githubOwner+"/"+CONFIG.githubRepo+"/contents/"+CONFIG.dataPath,{headers:{Authorization:"token "+CONFIG.githubToken,Accept:"application/vnd.github.v3+json"}}).then(function(r){if(!r.ok){if(r.status===404)return{requests:[],vehicles:[],drivers:[],config:{}};throw new Error("read fail "+r.status)}return r.json()}).then(function(d){s._sha=d.sha;return JSON.parse(atob(d.content))}).catch(function(e){console.error(e);return null})},writeData:function(data){var s=this;var c=btoa(unescape(encodeURIComponent(JSON.stringify(data))));var b={message:"update",content:c};if(s._sha)b.sha=s._sha;return fetch(CONFIG.apiBase+"/repos/"+CONFIG.githubOwner+"/"+CONFIG.githubRepo+"/contents/"+CONFIG.dataPath,{method:"PUT",headers:{Authorization:"token "+CONFIG.githubToken,Accept:"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify(b)}).then(function(r){if(!r.ok){if(r.status===409){s._sha=null;return s.writeData(data)}throw new Error("write fail "+r.status)}return r.json()}).then(function(d){s._sha=d.content.sha;return true}).catch(function(e){console.error(e);return false})}};
var S={user:null,tab:"dashboard",reqs:[],vehs:[],drvs:[],cfg:{},modal:null,sel:null,sync:"idle",load:false,editV:null,editD:null};
function gid(){return"rq_"+Date.now().toString(36)+"_"+Math.random().toString(36).substring(2,8)}
function fmt(t){if(!t)return"";var d=new Date(t);return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2)+" "+("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2)}
function sl(s){var m={pending:"待审批",approved:"已批准",rejected:"已驳回",dispatched:"已派车",completed:"已完成"};return m[s]||s}
function eh(s){if(!s)return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function rn(r){var m={applicant:"申请人",approver:"审批人",dispatcher:"派车人",admin:"管理员"};return m[r]||r}
function toast(m,t){t=t||"info";var d=document.createElement("div");d.className="toast toast-"+(t==="success"?"ok":t==="error"?"err":"info");d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.style.opacity="0";d.style.transition="opacity .3s";setTimeout(function(){d.remove()},300)},2500)}
function ldLocal(){try{return JSON.parse(localStorage.getItem("cdsp")||'{"reqs":[],"vehs":[],"drvs":[]}')}catch(e){return{reqs:[],vehs:[],drvs:[]}}}
function svLocal(d){localStorage.setItem("cdsp",JSON.stringify(d))}
function loadData(){S.load=true;R();if(!CONFIG.githubToken){S.sync="err";S.load=false;toast("请先在设置中配置GitHub Token","error");R();return}GitHubAPI.readData().then(function(d){if(d){S.reqs=d.requests||[];S.vehs=d.vehicles||[];S.drvs=d.drivers||[];S.cfg=d.config||{};S.sync="ok"}else{S.sync="err"}S.load=false;R()})}
function saveData(){var d={requests:S.reqs,vehicles:S.vehs,drivers:S.drvs,config:S.cfg};if(!CONFIG.githubToken){S.sync="err";toast("请先在设置中配置GitHub Token","error");R();return}S.sync="saving";R();GitHubAPI.writeData(d).then(function(ok){S.sync=ok?"ok":"err";if(ok)svLocal(d);R()})}

function R(){var a=document.getElementById("app");if(!S.user){a.innerHTML=RL();return}var ti=[];if(S.user.role==="applicant"||S.user.role==="admin"){ti.push({id:"dashboard",label:"我的申请"});ti.push({id:"new-request",label:"新建申请"})}if(S.user.role==="approver"||S.user.role==="admin")ti.push({id:"approve",label:"待审批"});if(S.user.role==="dispatcher"||S.user.role==="admin")ti.push({id:"dispatch",label:"派车管理"});if(S.user.role==="admin"){ti.push({id:"all",label:"全部记录"});ti.push({id:"manage",label:"基础数据"});ti.push({id:"settings",label:"系统设置"})}if(!ti.find(function(x){return x.id===S.tab}))S.tab=ti[0]?ti[0].id:"dashboard";a.innerHTML=RH(ti)+'<div class="main">'+RC()+"</div>"+(S.modal?RM():"");BE()}
function RL(){return'<div class="login-overlay"><div class="login-box"><h2>出车审批</h2><p class="sub">公司用车申请与审批</p><div class="fg"><label>用户名</label><input type="text" id="li-user" placeholder="输入您的姓名"></div><div class="fg"><label>角色</label><select id="li-role"><option value="">请选择</option><option value="applicant">用车申请人</option><option value="approver">审批人</option><option value="dispatcher">派车人</option><option value="admin">管理员</option></select></div><div class="fg"><label>登录密码</label><input type="password" id="li-pwd" placeholder="默认: 123456"></div><button class="btn btn-b" style="width:100%;margin-top:8px;justify-content:center" onclick="doLogin()">进入系统</button><p style="font-size:11px;color:#aaa;text-align:center;margin-top:14px">默认密码: 123456</p></div></div>'}
function doLogin(){var u=document.getElementById("li-user").value.trim();var r=document.getElementById("li-role").value;var p=document.getElementById("li-pwd").value;if(!u){toast("请输入用户名","error");return}if(!r){toast("请选择角色","error");return}var pw=S.cfg.password||"123456";if(p!==pw){toast("密码错误","error");return}S.user={name:u,role:r};loadData()}
function RH(ti){var sy=S.sync==="ok"?'<span style="color:#4caf50">&#9679;</span>':(S.sync==="saving"?"...":"<span style='color:#f44336'>&#9679;</span>");return'<div class="header"><h1>出车审批</h1><div class="nav">'+ti.map(function(x){return'<button class="'+(S.tab===x.id?"active":"")+'" data-tab="'+x.id+'">'+x.label+"</button>"}).join("")+'</div><div class="user-info">'+sy+" "+eh(S.user.name)+' <span class="badge">'+rn(S.user.role)+'</span><button class="btn btn-o btn-xs" onclick="openSettingsModal()" title="设置">&#9881;</button>'+eh(S.user.name)+'</div><button class="dm-item" onclick="toggleSM(event);switchTab('+"'"+'settings'+"'"+')">修改密码</button><button class="dm-item dm-divider" onclick="doLogout()" style="color:#d32f2f">退出登录</button></div></div></div></div>'}
function RC(){if(S.load)return'<p style="text-align:center;padding:40px;color:#999">加载中...</p>';switch(S.tab){case"dashboard":return RD();case"new-request":return RNR();case"approve":return RAP();case"dispatch":return RDP();case"all":return RAL();case"manage":return RMG();case"settings":return RST();default:return RD()}}
function RT(list,sa){if(list.length===0)return'<div class="empty">暂无记录</div>';return'<div style="overflow-x:auto"><table><thead><tr><th>时间</th><th>部门</th><th>申请人</th><th>事由</th><th>地点</th><th>出车</th><th>回来</th><th>车型号牌</th><th>司机</th><th>审批人</th><th>派车人</th><th>状态</th>'+(sa?"<th></th>":"")+"</tr></thead><tbody>"+list.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt)}).map(function(r){return"<tr><td>"+fmt(r.createdAt)+"</td><td>"+eh(r.department)+"</td><td>"+eh(r.applicant)+"</td><td>"+eh(r.reason)+"</td><td>"+eh(r.destination)+"</td><td>"+fmt(r.departureTime)+"</td><td>"+fmt(r.returnTime)+"</td><td>"+eh(r.vehicleModel||"")+" "+eh(r.plateNumber||"")+"</td><td>"+eh(r.driverName||"")+"</td><td>"+eh(r.approver||"")+"</td><td>"+eh(r.dispatcher||"")+'</td><td><span class="tag tag-'+(r.status==="pending"?"pending":r.status==="approved"||r.status==="dispatched"?"ok":r.status==="rejected"?"no":"purple")+'">'+sl(r.status)+"</span></td>"+(sa?'<td><button class="btn btn-o btn-xs" onclick="viewReq('+"'"+r.id+"'"+')">详情</button></td>':"")+"</tr>"}).join("")+"</tbody></table></div>"}
function RD(){var my=S.reqs.filter(function(r){return r.applicant===S.user.name});var s={total:my.length,pending:my.filter(function(r){return r.status==="pending"}).length,ok:my.filter(function(r){return r.status==="approved"||r.status==="dispatched"}).length,no:my.filter(function(r){return r.status==="rejected"}).length,done:my.filter(function(r){return r.status==="completed"}).length};return'<div class="stats-grid"><div class="stat-card"><div><div class="n">'+s.total+'</div><div class="l">申请总数</div></div></div><div class="stat-card"><div><div class="n">'+s.pending+'</div><div class="l">待审批</div></div></div><div class="stat-card"><div><div class="n">'+s.ok+'</div><div class="l">已通过</div></div></div><div class="stat-card"><div><div class="n">'+s.no+'</div><div class="l">已驳回</div></div></div><div class="stat-card"><div><div class="n">'+s.done+'</div><div class="l">已完成</div></div></div></div><div class="card"><div class="card-header"><h2>我的申请</h2><button class="btn btn-b btn-xs" onclick="switchTab('+"'"+'new-request'+"'"+')">+ 新建</button></div><div class="card-body">'+RT(my,true)+"</div></div>"}
function RNR(){var e=S.sel;var d=e||{};return'<div class="card"><div class="card-header"><h2>'+(e?"编辑":"新建")+'出车申请</h2></div><div class="card-body"><form onsubmit="submitReq(event)"><div class="fg"><label>用车部门 *</label><input type="text" id="rf-dpt" value="'+eh(d.department||"")+'" required></div><div class="fg"><label>申请人 *</label><input type="text" id="rf-app" value="'+eh(d.applicant||S.user.name||"")+'" required></div><div class="fg"><label>申请事由 *</label><input type="text" id="rf-rsn" value="'+eh(d.reason||"")+'" required></div><div class="fg"><label>出车地点 *</label><input type="text" id="rf-dst" value="'+eh(d.destination||"")+'" required></div><div class="fg"><label>出车时间 *</label><input type="datetime-local" id="rf-dep" value="'+(d.departureTime||"")+'" required></div><div class="fg"><label>预计回来 *</label><input type="datetime-local" id="rf-ret" value="'+(d.returnTime||"")+'" required></div><div class="fg"><label>审批人</label><input type="text" id="rf-apr" value="'+eh(d.approver||"")+'"></div><div class="fg"><label>派车人</label><input type="text" id="rf-dps" value="'+eh(d.dispatcher||"")+'" '+(S.user.role==="dispatcher"?"":"readonly")+'></div><div class="fg"><label>车辆</label><select id="rf-veh"><option value="">选择</option>'+S.vehs.map(function(v){return'<option value="'+eh(v.id)+'"'+(d.vehicleId===v.id?" selected":"")+">"+eh(v.model)+" - "+eh(v.plateNumber)+"</option>"}).join("")+'</select></div><div class="fg"><label>司机</label><select id="rf-drv"><option value="">选择</option>'+S.drvs.map(function(dr){return'<option value="'+eh(dr.id)+'"'+(d.driverId===dr.id?" selected":"")+">"+eh(dr.name)+"</option>"}).join("")+'</select></div><div class="fa"><button type="submit" class="btn btn-b">提交</button>'+(e?'<button type="button" class="btn btn-o" onclick="cancelEdit()">取消</button>':"")+"</div></form></div></div>"}
function submitReq(e){e.preventDefault();var vid=document.getElementById("rf-veh").value;var did=document.getElementById("rf-drv").value;var vh=S.vehs.find(function(v){return v.id===vid});var dv=S.drvs.find(function(d){return d.id===did});var r={id:S.sel?S.sel.id:gid(),department:document.getElementById("rf-dpt").value.trim(),applicant:document.getElementById("rf-app").value.trim(),reason:document.getElementById("rf-rsn").value.trim(),destination:document.getElementById("rf-dst").value.trim(),departureTime:document.getElementById("rf-dep").value,returnTime:document.getElementById("rf-ret").value,approver:document.getElementById("rf-apr").value.trim(),dispatcher:document.getElementById("rf-dps").value.trim(),vehicleModel:vh?vh.model:"",plateNumber:vh?vh.plateNumber:"",driverName:dv?dv.name:"",vehicleId:vid||"",driverId:did||"",status:S.sel?S.sel.status:"pending",createdAt:S.sel?S.sel.createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),timeline:S.sel?S.sel.timeline:[{time:new Date().toISOString(),action:"提交申请",user:S.user.name}]};if(S.sel){var i=S.reqs.findIndex(function(x){return x.id===S.sel.id});if(i>=0)S.reqs[i]=r}else{S.reqs.push(r)}S.sel=null;saveData();toast("提交成功","success");switchTab("dashboard")}
function cancelEdit(){S.sel=null;R()}
function RAP(){var p=S.reqs.filter(function(r){return r.status==="pending"});return'<div class="card"><div class="card-header"><h2>待审批 ('+p.length+')</h2></div><div class="card-body">'+(p.length===0?'<div class="empty">没有待审批</div>':'<div style="overflow-x:auto"><table><thead><tr><th>时间</th><th>部门</th><th>申请人</th><th>事由</th><th>出车</th><th>回来</th><th></th></tr></thead><tbody>'+p.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt)}).map(function(r){return"<tr><td>"+fmt(r.createdAt)+"</td><td>"+eh(r.department)+"</td><td>"+eh(r.applicant)+"</td><td>"+eh(r.reason)+"</td><td>"+fmt(r.departureTime)+"</td><td>"+fmt(r.returnTime)+'</td><td><button class="btn btn-g btn-xs" onclick="approveReq('+"'"+r.id+"'"+')">批准</button> <button class="btn btn-r btn-xs" onclick="rejectReq('+"'"+r.id+"'"+')">驳回</button> <button class="btn btn-o btn-xs" onclick="viewReq('+"'"+r.id+"'"+')">详情</button></td></tr>'}).join("")+"</tbody></table></div>")+"</div></div>"}
function approveReq(id){var r=S.reqs.find(function(x){return x.id===id});if(!r)return;r.status="approved";r.approver=S.user.name;r.updatedAt=new Date().toISOString();r.timeline=r.timeline||[];r.timeline.push({time:new Date().toISOString(),action:"审批通过",user:S.user.name});saveData();toast("已批准","success");R()}
function rejectReq(id){var r=S.reqs.find(function(x){return x.id===id});if(!r)return;r.status="rejected";r.approver=S.user.name;r.updatedAt=new Date().toISOString();r.timeline=r.timeline||[];r.timeline.push({time:new Date().toISOString(),action:"审批驳回",user:S.user.name});saveData();toast("已驳回");R()}
function RDP(){var td=S.reqs.filter(function(r){return r.status==="approved"||r.status==="dispatched"});return'<div class="card"><div class="card-header"><h2>派车管理</h2></div><div class="card-body">'+(td.length===0?'<div class="empty">没有需要派车的申请</div>':'<div style="overflow-x:auto"><table><thead><tr><th>时间</th><th>部门</th><th>申请人</th><th>事由</th><th>出车</th><th>车型号牌</th><th>司机</th><th>状态</th><th></th></tr></thead><tbody>'+td.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt)}).map(function(r){return"<tr><td>"+fmt(r.createdAt)+"</td><td>"+eh(r.department)+"</td><td>"+eh(r.applicant)+"</td><td>"+eh(r.reason)+"</td><td>"+fmt(r.departureTime)+"</td><td>"+eh(r.vehicleModel||"/")+" "+eh(r.plateNumber||"")+"</td><td>"+eh(r.driverName||"/")+'</td><td><span class="tag tag-'+(r.status==="approved"?"ok":"blue")+'">'+sl(r.status)+"</span></td><td>"+(r.status==="approved"?'<button class="btn btn-b btn-xs" onclick="dispatchVeh('+"'"+r.id+"'"+')">派车</button>':"")+(r.status==="dispatched"?'<button class="btn btn-g btn-xs" onclick="completeTrip('+"'"+r.id+"'"+')">完成</button>':"")+' <button class="btn btn-o btn-xs" onclick="editDisp('+"'"+r.id+"'"+')">编辑</button></td></tr>'}).join("")+"</tbody></table></div>")+"</div></div>"}
function dispatchVeh(id){var r=S.reqs.find(function(x){return x.id===id});if(!r)return;if(!r.vehicleModel||!r.driverName){toast("请先编辑车辆和司机","error");return}r.status="dispatched";r.dispatcher=S.user.name;r.updatedAt=new Date().toISOString();r.timeline=r.timeline||[];r.timeline.push({time:new Date().toISOString(),action:"已派车",user:S.user.name});saveData();toast("派车成功","success");R()}
function completeTrip(id){var r=S.reqs.find(function(x){return x.id===id});if(!r)return;r.status="completed";r.updatedAt=new Date().toISOString();r.timeline=r.timeline||[];r.timeline.push({time:new Date().toISOString(),action:"行程完成",user:S.user.name});saveData();toast("已完成","success");R()}
function editDisp(id){var r=S.reqs.find(function(x){return x.id===id});if(!r)return;S.sel=r;S.modal="edit-dispatch";R()}
function viewReq(id){S.sel=S.reqs.find(function(r){return r.id===id});S.modal="view";R()}

function RAL(){return'<div class="card"><div class="card-header"><h2>全部记录 ('+S.reqs.length+')</h2></div><div class="card-body"><div class="filter-bar"><select id="alf" onchange="R()"><option value="">全部</option><option value="pending">待审批</option><option value="approved">已批准</option><option value="rejected">已驳回</option><option value="dispatched">已派车</option><option value="completed">已完成</option></select><input type="text" id="als" placeholder="搜索..." oninput="R()"></div>'+ARF()+"</div></div>"}
function ARF(){var list=S.reqs.slice();var sf=document.getElementById("alf");var ss=document.getElementById("als");if(sf&&sf.value)list=list.filter(function(r){return r.status===sf.value});if(ss&&ss.value){var q=ss.value.toLowerCase();list=list.filter(function(r){return(r.applicant||"").toLowerCase().indexOf(q)>=0||(r.department||"").toLowerCase().indexOf(q)>=0||(r.reason||"").toLowerCase().indexOf(q)>=0})}return RT(list,true)}
function RMG(){return'<div class="two-col"><div class="card"><div class="card-header"><h2>车辆管理 ('+S.vehs.length+')</h2><button class="btn btn-b btn-xs" onclick="openVM()">+ 添加</button></div><div class="card-body">'+(S.vehs.length===0?'<div class="empty">暂无车辆</div>':'<table><thead><tr><th>品牌型号</th><th>车牌号</th><th>状态</th><th></th></tr></thead><tbody>'+S.vehs.map(function(v){return'<tr><td>'+eh(v.model)+'</td><td>'+eh(v.plateNumber)+'</td><td>'+(v.status==="active"?'<span style="color:#388e3c">可用</span>':'<span style="color:#999">停用</span>')+'</td><td><button class="btn btn-o btn-xs" onclick="editVeh('+"'"+v.id+"'"+')">编辑</button> <button class="btn btn-r btn-xs" onclick="delVeh('+"'"+v.id+"'"+')">删除</button></td></tr>'}).join("")+"</tbody></table>")+'</div></div><div class="card"><div class="card-header"><h2>司机管理 ('+S.drvs.length+')</h2><button class="btn btn-b btn-xs" onclick="openDM()">+ 添加</button></div><div class="card-body">'+(S.drvs.length===0?'<div class="empty">暂无司机</div>':'<table><thead><tr><th>姓名</th><th>电话</th><th>状态</th><th></th></tr></thead><tbody>'+S.drvs.map(function(d){return'<tr><td>'+eh(d.name)+'</td><td>'+eh(d.phone||"")+'</td><td>'+(d.status==="active"?'<span style="color:#388e3c">在职</span>':'<span style="color:#999">离职</span>')+'</td><td><button class="btn btn-o btn-xs" onclick="editDrv('+"'"+d.id+"'"+')">编辑</button> <button class="btn btn-r btn-xs" onclick="delDrv('+"'"+d.id+"'"+')">删除</button></td></tr>'}).join("")+"</tbody></table>")+"</div></div></div>"}
function RST(){return'<div class="card" style="max-width:580px"><div class="card-header"><h2>系统设置</h2></div><div class="card-body"><div class="set-sec"><h3>修改密码</h3><div class="fg" style="margin-bottom:8px"><label>当前密码</label><input type="password" id="st-op"></div><div class="fg" style="margin-bottom:8px"><label>新密码</label><input type="password" id="st-np"></div><div class="fg" style="margin-bottom:12px"><label>确认新密码</label><input type="password" id="st-cp"></div><button class="btn btn-b" onclick="chPwd()">修改密码</button></div><div class="set-sec"><h3>数据管理</h3><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-o" onclick="expData()">导出备份</button><button class="btn btn-o" onclick="document.getElementById('+"'"+'ifile'+"'"+').click()">导入恢复</button><input type="file" id="ifile" style="display:none" accept=".json" onchange="impData(event)"><button class="btn btn-r btn-xs" onclick="clrData()">清空数据</button></div></div></div></div>'}
function RM(){if(S.modal==="settings")return RSM();if(S.modal==="view")return RVM();if(S.modal==="edit-dispatch")return REDM();if(S.modal==="vehicle")return RVHM();if(S.modal==="driver")return RDRM();return""}
function RVM(){var r=S.sel;return'<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal"><div class="modal-header"><h3>申请详情</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><span class="tag tag-'+(r.status==="pending"?"pending":r.status==="approved"||r.status==="dispatched"?"ok":r.status==="rejected"?"no":"purple")+'">'+sl(r.status)+'</span><div class="dg" style="margin-top:12px"><div class="di"><div class="dl">编号</div><div class="dv">'+r.id+'</div></div><div class="di"><div class="dl">时间</div><div class="dv">'+fmt(r.createdAt)+'</div></div><div class="di"><div class="dl">部门</div><div class="dv">'+eh(r.department)+'</div></div><div class="di"><div class="dl">申请人</div><div class="dv">'+eh(r.applicant)+'</div></div><div class="di"><div class="dl">事由</div><div class="dv">'+eh(r.reason)+'</div></div><div class="di"><div class="dl">地点</div><div class="dv">'+eh(r.destination)+'</div></div><div class="di"><div class="dl">出车</div><div class="dv">'+fmt(r.departureTime)+'</div></div><div class="di"><div class="dl">回来</div><div class="dv">'+fmt(r.returnTime)+'</div></div><div class="di"><div class="dl">审批人</div><div class="dv">'+eh(r.approver||"/")+'</div></div><div class="di"><div class="dl">派车人</div><div class="dv">'+eh(r.dispatcher||"/")+'</div></div><div class="di"><div class="dl">车型</div><div class="dv">'+eh(r.vehicleModel||"/")+'</div></div><div class="di"><div class="dl">车牌</div><div class="dv">'+eh(r.plateNumber||"/")+'</div></div><div class="di"><div class="dl">司机</div><div class="dv">'+eh(r.driverName||"/")+'</div></div></div>'+(r.timeline&&r.timeline.length>0?'<div style="margin-top:16px"><h4 style="font-size:13px;font-weight:600;margin-bottom:6px">审批进度</h4><ul class="timeline">'+r.timeline.map(function(t){return'<li><div class="t">'+fmt(t.time)+'</div>'+eh(t.action)+" - "+eh(t.user)+"</li>"}).join("")+"</ul></div>":"")+"</div></div></div>"}
function REDM(){var r=S.sel;return'<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal"><div class="modal-header"><h3>编辑派车</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><p style="margin-bottom:12px">'+eh(r.applicant)+" - "+eh(r.reason)+'</p><form onsubmit="saveDisp(event)"><div class="fg"><label>车辆</label><select id="df-v">'+S.vehs.map(function(v){return'<option value="'+eh(v.id)+'"'+(r.vehicleId===v.id?" selected":"")+">"+eh(v.model)+" - "+eh(v.plateNumber)+"</option>"}).join("")+'</select></div><div class="fg"><label>司机</label><select id="df-d">'+S.drvs.map(function(d){return'<option value="'+eh(d.id)+'"'+(r.driverId===d.id?" selected":"")+">"+eh(d.name)+"</option>"}).join("")+'</select></div><div class="fg"><label>派车人</label><input type="text" id="df-p" value="'+eh(r.dispatcher||S.user.name||"")+'"></div><div class="fa"><button type="submit" class="btn btn-b">保存</button><button type="button" class="btn btn-o" onclick="closeModal()">取消</button></div></form></div></div></div>'}
function saveDisp(e){e.preventDefault();var r=S.sel;var vh=S.vehs.find(function(v){return v.id===document.getElementById("df-v").value});var dv=S.drvs.find(function(d){return d.id===document.getElementById("df-d").value});r.vehicleModel=vh?vh.model:"";r.plateNumber=vh?vh.plateNumber:"";r.vehicleId=vh?vh.id:"";r.driverName=dv?dv.name:"";r.driverId=dv?dv.id:"";r.dispatcher=document.getElementById("df-p").value.trim();r.updatedAt=new Date().toISOString();saveData();closeModal();toast("已更新","success")}
function RVHM(){var v=S.editV;return'<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal" style="max-width:440px"><div class="modal-header"><h3>'+(v?"编辑":"添加")+'车辆</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><form onsubmit="saveVeh(event)"><div class="fg"><label>品牌型号</label><input type="text" id="vh-m" value="'+eh(v?v.model:"")+'" required></div><div class="fg"><label>车牌号</label><input type="text" id="vh-p" value="'+eh(v?v.plateNumber:"")+'" required></div><div class="fg"><label>状态</label><select id="vh-s"><option value="active"'+(v&&v.status!=="inactive"?" selected":"")+'>可用</option><option value="inactive"'+(v&&v.status==="inactive"?" selected":"")+'>停用</option></select></div><div class="fa"><button type="submit" class="btn btn-b">保存</button><button type="button" class="btn btn-o" onclick="closeModal()">取消</button></div></form></div></div></div>'}
function RDRM(){var d=S.editD;return'<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal" style="max-width:440px"><div class="modal-header"><h3>'+(d?"编辑":"添加")+'司机</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><form onsubmit="saveDrv(event)"><div class="fg"><label>姓名</label><input type="text" id="dr-n" value="'+eh(d?d.name:"")+'" required></div><div class="fg"><label>电话</label><input type="text" id="dr-p" value="'+eh(d?d.phone:"")+'"></div><div class="fg"><label>状态</label><select id="dr-s"><option value="active"'+(d&&d.status!=="inactive"?" selected":"")+'>在职</option><option value="inactive"'+(d&&d.status==="inactive"?" selected":"")+'>离职</option></select></div><div class="fa"><button type="submit" class="btn btn-b">保存</button><button type="button" class="btn btn-o" onclick="closeModal()">取消</button></div></form></div></div></div>'}
function chPwd(){var op=document.getElementById("st-op").value;var np=document.getElementById("st-np").value;var cp=document.getElementById("st-cp").value;var cur=S.cfg.password||"123456";if(op!==cur){toast("当前密码错误","error");return}if(!np||np.length<4){toast("新密码至少4位","error");return}if(np!==cp){toast("两次密码不一致","error");return}S.cfg.password=np;saveData();toast("密码已修改","success");document.getElementById("st-op").value="";document.getElementById("st-np").value="";document.getElementById("st-cp").value=""}
function expData(){var d={requests:S.reqs,vehicles:S.vehs,drivers:S.drvs,config:S.cfg};var b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download="backup_"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(u);toast("已导出","success")}
function impData(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(!d.requests||!Array.isArray(d.requests))throw new Error("fmt");S.reqs=d.requests;S.vehs=d.vehicles||[];S.drvs=d.drivers||[];S.cfg=d.config||{};saveData();toast("导入: "+S.reqs.length+" 条","success");R()}catch(er){toast("格式错误","error")}};r.readAsText(f);e.target.value=""}
function clrData(){if(!confirm("确认清空所有数据？不可恢复！"))return;S.reqs=[];S.vehs=[];S.drvs=[];saveData();toast("已清空");R()}
function openVM(v){S.editV=v||null;S.modal="vehicle";R()}
function openDM(d){S.editD=d||null;S.modal="driver";R()}
function editVeh(id){var v=S.vehs.find(function(x){return x.id===id});if(v)openVM(v)}
function editDrv(id){var d=S.drvs.find(function(x){return x.id===id});if(d)openDM(d)}
function saveVeh(e){e.preventDefault();var v={id:S.editV?S.editV.id:"vh_"+Date.now().toString(36),model:document.getElementById("vh-m").value.trim(),plateNumber:document.getElementById("vh-p").value.trim(),status:document.getElementById("vh-s").value};if(S.editV){var i=S.vehs.findIndex(function(x){return x.id===S.editV.id});if(i>=0)S.vehs[i]=v}else{S.vehs.push(v)}S.editV=null;saveData();closeModal();toast("已保存","success")}
function saveDrv(e){e.preventDefault();var d={id:S.editD?S.editD.id:"dr_"+Date.now().toString(36),name:document.getElementById("dr-n").value.trim(),phone:document.getElementById("dr-p").value.trim(),status:document.getElementById("dr-s").value};if(S.editD){var i=S.drvs.findIndex(function(x){return x.id===S.editD.id});if(i>=0)S.drvs[i]=d}else{S.drvs.push(d)}S.editD=null;saveData();closeModal();toast("已保存","success")}
function delVeh(id){if(!confirm("删除该车辆？"))return;S.vehs=S.vehs.filter(function(v){return v.id!==id});saveData();toast("已删除");R()}
function delDrv(id){if(!confirm("删除该司机？"))return;S.drvs=S.drvs.filter(function(d){return d.id!==id});saveData();toast("已删除");R()}

function closeModal(){S.modal=null;S.sel=null;S.editV=null;S.editD=null;R()}
function switchTab(t){S.tab=t;S.sel=null;R()}
function doLogout(){S.user=null;S.tab="dashboard";R()}
function BE(){var btns=document.querySelectorAll(".nav button[data-tab]");for(var i=0;i<btns.length;i++){(function(t){btns[i].onclick=function(){switchTab(t)}})(btns[i].dataset.tab)}}

(function(){var l=ldLocal();if(l.reqs&&l.reqs.length>0){S.reqs=l.reqs;S.vehs=l.vehs||[];S.drvs=l.drvs||[];S.cfg=l.cfg||{}}R()})();
function openSettingsModal(){S.modal="settings";R()}function RSM(){return'<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal" style="max-width:460px"><div class="modal-header"><h3>设置</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><div class="set-sec"><h3>用户信息</h3><div class="dg"><div class="di"><div class="dl">用户名</div><div class="dv">'+eh(S.user.name)+'</div></div><div class="di"><div class="dl">角色</div><div class="dv">'+rn(S.user.role)+'</div></div></div></div><div class="set-sec"><h3>修改密码</h3><div class="fg" style="margin-bottom:8px"><label>当前密码</label><input type="password" id="st-op"></div><div class="fg" style="margin-bottom:8px"><label>新密码</label><input type="password" id="st-np"></div><div class="fg" style="margin-bottom:12px"><label>确认新密码</label><input type="password" id="st-cp"></div><button class="btn btn-b" onclick="chPwd()">修改密码</button></div><div class="set-sec"><h3>数据同步</h3><p style="font-size:12px;color:#888;margin-bottom:8px">配置GitHub Token用于云端数据同步</p><div class="fg" style="margin-bottom:6px"><label>GitHub Token</label><input type="password" id="st-gt" value="'+(localStorage.getItem("github_token")||"")+'" placeholder="输入Token"></div><button class="btn btn-b" onclick="saveGithubToken()">保存令牌</button></div><div class="set-sec" style="border-top:1px solid #eee;padding-top:16px;margin-top:16px"><button class="btn btn-r" onclick="doLogout();closeModal()">退出登录</button></div></div></div></div>'}function saveGithubToken(){var t=document.getElementById("st-gt").value.trim();if(!t){toast("请输入GitHub Token","error");return}localStorage.setItem("github_token",t);CONFIG.githubToken=t;toast("令牌已保存","success")}
</script>
</body>
</html>
