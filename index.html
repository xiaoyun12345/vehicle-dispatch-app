<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出车审批</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.header{background:#1a1a2e;color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:600}
.nav{display:flex;gap:2px;height:100%}
.nav button{background:none;border:none;color:#8888a8;padding:0 14px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.nav button.active{color:#4fc3f7;border-bottom:2px solid #4fc3f7}
.user-info{display:flex;align-items:center;gap:8px;font-size:12px;color:#b0b0c0}
.badge{background:#4fc3f7;color:#1a1a2e;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600}
.main{padding:20px;max-width:1400px;margin:0 auto}
.card{background:#fff;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e8e8ec;margin-bottom:16px}
.card-header{padding:14px 18px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.card-header h2{font-size:15px;font-weight:600}
.card-body{padding:18px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:6px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e8e8ec}
.stat-card .n{font-size:26px;font-weight:700}
.stat-card .l{font-size:12px;color:#888}
table{width:100%;border-collapse:collapse}
th{background:#fafafa;padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:#666;border-bottom:2px solid #e8e8ec;white-space:nowrap}
td{padding:9px 12px;font-size:13px;border-bottom:1px solid #f0f0f0}
tr:hover{background:#fafcff}
.tag{display:inline-block;padding:3px 9px;border-radius:3px;font-size:11px;font-weight:600}
.tag-pending{background:#fff3e0;color:#e65100}
.tag-approved{background:#e3f2fd;color:#1565c0}
.tag-rejected{background:#fce4ec;color:#c62828}
.tag-dispatched{background:#f3e5f5;color:#6a1b9a}
.tag-completed{background:#e8f5e9;color:#2e7d32}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;font-family:inherit;white-space:nowrap;text-decoration:none}
.btn-primary{background:#1976d2;color:#fff}
.btn-primary:hover{background:#1565c0}
.btn-success{background:#388e3c;color:#fff}
.btn-danger{background:#d32f2f;color:#fff}
.btn-secondary{background:#fff;color:#555;border-color:#ddd}
.btn-secondary:hover{background:#f5f5f5}
.btn-xs{padding:3px 7px;font-size:11px}
form{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;font-weight:500;color:#555}
.fg input,.fg select,.fg textarea{padding:8px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#1976d2}
.fa{grid-column:1/-1;display:flex;gap:8px;padding-top:4px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px}
.dg .di{display:flex;flex-direction:column;gap:1px}
.dg .dl{font-size:11px;color:#888}
.dg .dv{font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
.modal-header{padding:14px 18px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff}
.modal-header h3{font-size:14px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;color:#999;font-size:18px;padding:2px 6px}
.modal-close:hover{color:#333;background:#f0f0f0}
.modal-body{padding:18px}
.empty{text-align:center;padding:50px 20px;color:#999;font-size:14px}
.loading-overlay{display:flex;align-items:center;justify-content:center;padding:40px;color:#999;font-size:14px}
.loading-overlay .spinner{width:24px;height:24px;border:3px solid #e0e0e0;border-top-color:#1976d2;border-radius:50%;animation:spin .8s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:16px;right:16px;z-index:300;padding:10px 18px;border-radius:5px;color:#fff;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideIn .3s ease;max-width:360px}
.toast-success{background:#2e7d32}
.toast-error{background:#c62828}
.toast-info{background:#1565c0}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px;font-family:inherit}
.set-sec{margin-top:16px}
.set-sec h3{font-size:14px;font-weight:600;margin-bottom:10px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.two-col{grid-template-columns:1fr}form{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}.header{padding:0 10px}.nav button{padding:0 8px;font-size:11px}.main{padding:10px}}
.login-overlay{position:fixed;inset:0;background:#1a1a2e;z-index:500;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:8px;padding:36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h2{font-size:20px;margin-bottom:6px}
.login-box .sub{color:#888;font-size:13px;margin-bottom:20px}
.login-box .fg{margin-bottom:14px}
.login-box .fg label{display:block;margin-bottom:4px}
.login-box .fg select,.login-box .fg input{width:100%}
.timeline{list-style:none;padding:0;margin:8px 0}
.timeline li{padding:6px 0;border-left:2px solid #e0e0e0;padding-left:14px;margin-left:6px;font-size:12px;color:#666}
.timeline li .t{font-size:11px;color:#999}
</style>
</head>
<body>
<div id="app"><div class="loading-overlay" style="min-height:60vh"><div class="spinner"></div>加载中...</div></div>
<script>
var LS={get:function(k){try{return localStorage.getItem(k)}catch(e){return null}},set:function(k,v){try{localStorage.setItem(k,v)}catch(e){}},rm:function(k){try{localStorage.removeItem(k)}catch(e){}},getJson:function(k,d){try{var v=LS.get(k);return v?JSON.parse(v):d}catch(e){return d}},setJson:function(k,v){LS.set(k,JSON.stringify(v))}};
var CFG={owner:"xiaoyun12345",repo:"vehicle-dispatch-app",token:"",dataPath:"data.json",api:"https://api.github.com"};
var ST={user:null,users:[],tab:"dashboard",reqs:[],vehs:[],drvs:[],load:false,saving:false,modal:null,sel:null,editV:null,editD:null};
function gid(){return"rq_"+Date.now().toString(36)+"_"+Math.random().toString(36).substring(2,8)}
function fmt(t){if(!t)return"";var d=new Date(t);return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2)+" "+("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2)}
function stl(s){var m={pending:'待审批',approved:'已批准',rejected:'已驳回',dispatched:'已派车',completed:'已完成'};return m[s]||s}
function rn(r){var m={applicant:'申请人',approver:'审批人',dispatcher:'派车人',admin:'管理员'};return m[r]||r}
function eh(s){if(!s)return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function stg(s){var m={pending:"pending",approved:"approved",rejected:"rejected",dispatched:"dispatched",completed:"completed"};return m[s]||"pending"}
function toast(m,t){t=t||"info";var d=document.createElement("div");d.className="toast toast-"+(t==="success"?"success":t==="error"?"error":"info");d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.style.opacity="0";d.style.transition="opacity .3s";setTimeout(function(){d.remove()},300)},2500)}
function af(url,opt){opt=opt||{};opt.timeout=opt.timeout||15000;return new Promise(function(resolve,reject){var ctrl=null;if(typeof AbortController!=="undefined"){ctrl=new AbortController();opt.signal=ctrl.signal}var tid=setTimeout(function(){if(ctrl)try{ctrl.abort()}catch(e){};reject(new Error("timeout"))},opt.timeout);fetch(url,opt).then(function(r){clearTimeout(tid);resolve(r)}).catch(function(e){clearTimeout(tid);reject(e)})})}
var GH={_sha:null};
GH.read=function(){if(!CFG.token)return Promise.resolve(null);var u=CFG.api+"/repos/"+CFG.owner+"/"+CFG.repo+"/contents/"+CFG.dataPath;return af(u,{headers:{Authorization:"token "+CFG.token,Accept:"application/vnd.github.v3+json"}}).then(function(r){if(r.status===404)return{requests:[],vehicles:[],drivers:[],config:{}};if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}).then(function(d){GH._sha=d.sha;return JSON.parse(decodeURIComponent(escape(atob(d.content))))}).catch(function(e){if(e.message==="timeout")console.warn("GH read timeout");else console.error("GH read:",e);return null})};
GH.write=function(data){if(!CFG.token)return Promise.resolve(false);var json=JSON.stringify(data);var b64=btoa(unescape(encodeURIComponent(json)));var body={message:"update data",content:b64,branch:"master"};if(GH._sha)body.sha=GH._sha;var u=CFG.api+"/repos/"+CFG.owner+"/"+CFG.repo+"/contents/"+CFG.dataPath;return af(u,{method:"PUT",headers:{Authorization:"token "+CFG.token,Accept:"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify(body)}).then(function(r){if(!r.ok){if(r.status===409){GH._sha=null;return GH.write(data)}throw new Error("HTTP "+r.status)}return r.json()}).then(function(d){GH._sha=d.content.sha;return true}).catch(function(e){if(e.message==="timeout")console.warn("GH write timeout");else console.error("GH write:",e);return false})};
function ld(){return LS.getJson("vds_data",{requests:[],vehicles:[],drivers:[],config:{users:[{name:"管理员",password:"123456",role:"admin"}]}})}
function sd(d){LS.setJson("vds_data",d)}function loadData(){ST.load=true;render();var local=ld();ST.reqs=local.requests||[];ST.vehs=local.vehicles||[];ST.drvs=local.drivers||[];ST.users=(local.config&&local.config.users)||[];if(ST.users.length===0)ST.users=[{name:"管理员",password:"123456",role:"admin"}];var tid=setTimeout(function(){ST.load=false;render();if(!ST.user)showLogin();toast("数据加载超时，使用本地数据","info")},5000);GH.read().then(function(gd){clearTimeout(tid);if(gd){ST.reqs=gd.requests||ST.reqs;ST.vehs=gd.vehicles||ST.vehs;ST.drvs=gd.drivers||ST.drvs;ST.users=(gd.config&&gd.config.users)||ST.users;sd({requests:ST.reqs,vehicles:ST.vehs,drivers:ST.drvs,config:{users:ST.users}})}}).catch(function(){}).then(function(){ST.load=false;render();if(!ST.user)showLogin()})}
function saveData(noSync){var d={requests:ST.reqs,vehicles:ST.vehs,drivers:ST.drvs,config:{users:ST.users}};sd(d);if(noSync)return;ST.saving=true;var tid=setTimeout(function(){ST.saving=false;toast("数据同步超时","error")},10000);GH.write(d).then(function(ok){clearTimeout(tid);ST.saving=false;if(ok)toast("数据已同步","success");else if(CFG.token)toast("数据同步失败，已保存在本地","error")}).catch(function(){clearTimeout(tid);ST.saving=false})}
function showLogin(){document.getElementById("app").innerHTML='<div class="login-overlay"><div class="login-box"><h2>出车审批</h2><p class="sub">公司用车申请与审批</p><div class="fg"><label>用户名</label><input type="text" id="li-user" placeholder="输入您的姓名"></div><div class="fg"><label>密码</label><input type="password" id="li-pwd" placeholder="默认密码: 123456"></div><button class="btn btn-primary" style="width:100%;margin-top:8px;justify-content:center" onclick="doLogin()">进入系统</button><p style="font-size:11px;color:#aaa;text-align:center;margin-top:14px">默认管理员: 管理员 / 123456</p></div></div>'}
function doLogin(){var u=document.getElementById("li-user").value.trim();var p=document.getElementById("li-pwd").value;if(!u||!p){toast("请输入用户名和密码","error");return}var us=ST.users;if(us.length===0)us=[{name:"管理员",password:"123456",role:"admin"}];var f=null;for(var i=0;i<us.length;i++){if(us[i].name===u&&us[i].password===p){f=us[i];break}}if(!f){toast("用户名或密码错误","error");return}ST.user={name:f.name,role:f.role};LS.setJson("vds_user",ST.user);render();toast("登录成功","success")}
function doLogout(){ST.user=null;ST.tab="dashboard";LS.rm("vds_user");showLogin()}
function render(){var a=document.getElementById("app");if(!ST.user){showLogin();return}if(ST.load){a.innerHTML='<div class="loading-overlay" style="min-height:60vh"><div class="spinner"></div>加载中...</div>';return}var tabs=[];if(ST.user.role==="applicant"||ST.user.role==="admin"){tabs.push({id:"dashboard",label:"我的申请"});tabs.push({id:"new-request",label:"新建申请"})}if(ST.user.role==="approver"||ST.user.role==="admin")tabs.push({id:"approve",label:"待审批"});if(ST.user.role==="dispatcher"||ST.user.role==="admin")tabs.push({id:"dispatch",label:"派车管理"});if(ST.user.role==="admin"){tabs.push({id:"all",label:"全部记录"});tabs.push({id:"manage",label:"基础数据"});tabs.push({id:"settings",label:"系统设置"})}if(!tabs.some(function(t){return t.id===ST.tab}))ST.tab=tabs[0]?tabs[0].id:"dashboard";a.innerHTML=renderHeader(tabs)+'<div class="main">'+renderContent()+"</div>"+(ST.modal?renderModal():"")}
function renderHeader(tabs){var sy=ST.saving?'<span style="color:#ff9800">●</span>':'<span style="color:#4caf50">●</span>';var html='<div class="header"><h1>出车审批</h1><div class="nav">';for(var i=0;i<tabs.length;i++){html+='<button class="'+(ST.tab===tabs[i].id?"active":"")+'" data-tab="'+tabs[i].id+'">'+tabs[i].label+'</button>'}html+='</div><div class="user-info">'+sy+' '+eh(ST.user.name)+' <span class="badge">'+rn(ST.user.role)+'</span><button class="btn btn-secondary btn-xs" onclick="ST.modal='+"'settings'"+';render()" title="设置">⚙</button><button class="btn btn-secondary btn-xs" onclick="doLogout()" title="退出" style="color:#d32f2f">退出</button></div></div>';return html}
function renderContent(){switch(ST.tab){case"dashboard":return renderDashboard();case"new-request":return renderNewRequest();case"approve":return renderApprove();case"dispatch":return renderDispatch();case"all":return renderAll();case"manage":return renderManage();case"settings":return renderSettings();default:return renderDashboard()}}
function renderModal(){if(ST.modal==="view")return renderViewModal();if(ST.modal==="edit-dispatch")return renderEditDispatchModal();if(ST.modal==="vehicle")return renderVehicleModal();if(ST.modal==="driver")return renderDriverModal();if(ST.modal==="settings")return renderSettingsModal();return""}
function renderDashboard(){var my=ST.reqs.filter(function(r){return r.applicant===ST.user.name});var s={total:my.length,pending:my.filter(function(r){return r.status==="pending"}).length,approved:my.filter(function(r){return r.status==="approved"}).length,rejected:my.filter(function(r){return r.status==="rejected"}).length,dispatched:my.filter(function(r){return r.status==="dispatched"}).length,completed:my.filter(function(r){return r.status==="completed"}).length};var html='<div class="stats-grid"><div class="stat-card"><div class="n">'+s.total+'</div><div class="l">申请总数</div></div><div class="stat-card"><div class="n">'+s.pending+'</div><div class="l">待审批</div></div><div class="stat-card"><div class="n">'+s.approved+'</div><div class="l">已通过</div></div><div class="stat-card"><div class="n">'+s.rejected+'</div><div class="l">已驳回</div></div><div class="stat-card"><div class="n">'+s.dispatched+'</div><div class="l">已派车</div></div><div class="stat-card"><div class="n">'+s.completed+'</div><div class="l">已完成</div></div></div><div class="card"><div class="card-header"><h2>我的申请</h2><button class="btn btn-primary btn-xs" onclick="ST.tab='+"'new-request'"+';render()">+ 新建</button></div><div class="card-body">'+renderTable(my,true)+"</div></div>";return html}
function renderTable(list,sa){if(list.length===0)return'<div class="empty">暂无记录</div>';var sorted=list.slice().sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt)});var html='<div style="overflow-x:auto"><table><thead><tr><th>时间</th><th>部门</th><th>申请人</th><th>事由</th><th>地点</th><th>出车</th><th>回来</th><th>车型号牌</th><th>司机</th><th>审批人</th><th>派车人</th><th>状态</th>'+(sa?"<th></th>":"")+"</tr></thead><tbody>";for(var i=0;i<sorted.length;i++){var r=sorted[i];html+='<tr><td>'+fmt(r.createdAt)+'</td><td>'+eh(r.department)+'</td><td>'+eh(r.applicant)+'</td><td>'+eh(r.reason)+'</td><td>'+eh(r.destination)+'</td><td>'+fmt(r.departureTime)+'</td><td>'+fmt(r.returnTime)+'</td><td>'+eh(r.vehicleModel||"")+' '+eh(r.plateNumber||"")+'</td><td>'+eh(r.driverName||"")+'</td><td>'+eh(r.approver||"")+'</td><td>'+eh(r.dispatcher||"")+'</td><td><span class="tag tag-'+stg(r.status)+'">'+stl(r.status)+'</span></td>'+(sa?'<td><button class="btn btn-secondary btn-xs" onclick="viewReq('+"'"+r.id+"'"+')">详情</button></td>':"")+"</tr>"}html+="</tbody></table></div>";return html}
function renderNewRequest(){var e=ST.sel;var d=e||{};var html='<div class="card"><div class="card-header"><h2>'+(e?"编辑":"新建")+'出车申请</h2></div><div class="card-body"><form onsubmit="submitReq(event)"><div class="fg"><label>用车部门 *</label><input type="text" id="rf-dpt" value="'+eh(d.department||"")+'" required></div><div class="fg"><label>申请人 *</label><input type="text" id="rf-app" value="'+eh(d.applicant||ST.user.name||"")+'" required></div><div class="fg"><label>申请事由 *</label><input type="text" id="rf-rsn" value="'+eh(d.reason||"")+'" required></div><div class="fg"><label>出车地点 *</label><input type="text" id="rf-dst" value="'+eh(d.destination||"")+'" required></div><div class="fg"><label>出车时间 *</label><input type="datetime-local" id="rf-dep" value="'+(d.departureTime||"")+'" required></div><div class="fg"><label>预计回来 *</label><input type="datetime-local" id="rf-ret" value="'+(d.returnTime||"")+'" required></div><div class="fg"><label>审批人</label><input type="text" id="rf-apr" value="'+eh(d.approver||"")+'"></div><div class="fg"><label>派车人</label><input type="text" id="rf-dps" value="'+eh(d.dispatcher||"")+'" '+(ST.user.role==="dispatcher"?"":"readonly")+'></div><div class="fg"><label>车辆</label><select id="rf-veh"><option value="">选择</option>';for(var i=0;i<ST.vehs.length;i++){html+='<option value="'+eh(ST.vehs[i].id)+'"'+(d.vehicleId===ST.vehs[i].id?" selected":"")+'>'+eh(ST.vehs[i].model)+' - '+eh(ST.vehs[i].plateNumber)+'</option>'}html+='</select></div><div class="fg"><label>司机</label><select id="rf-drv"><option value="">选择</option>';for(var i=0;i<ST.drvs.length;i++){html+='<option value="'+eh(ST.drvs[i].id)+'"'+(d.driverId===ST.drvs[i].id?" selected":"")+'>'+eh(ST.drvs[i].name)+'</option>'}html+='</select></div><div class="fa"><button type="submit" class="btn btn-primary">提交</button>'+(e?'<button type="button" class="btn btn-secondary" onclick="cancelEdit()">取消</button>':"")+'</div></form></div></div>';return html}
function submitReq(ev){ev.preventDefault();var vid=document.getElementById("rf-veh").value;var did=document.getElementById("rf-drv").value;var vh=null;for(var i=0;i<ST.vehs.length;i++){if(ST.vehs[i].id===vid){vh=ST.vehs[i];break}}var dv=null;for(var i=0;i<ST.drvs.length;i++){if(ST.drvs[i].id===did){dv=ST.drvs[i];break}}var r={id:ST.sel?ST.sel.id:gid(),department:document.getElementById("rf-dpt").value.trim(),applicant:document.getElementById("rf-app").value.trim(),reason:document.getElementById("rf-rsn").value.trim(),destination:document.getElementById("rf-dst").value.trim(),departureTime:document.getElementById("rf-dep").value,returnTime:document.getElementById("rf-ret").value,approver:document.getElementById("rf-apr").value.trim(),dispatcher:document.getElementById("rf-dps").value.trim(),vehicleModel:vh?vh.model:"",plateNumber:vh?vh.plateNumber:"",driverName:dv?dv.name:"",vehicleId:vid||"",driverId:did||"",status:ST.sel?ST.sel.status:"pending",createdAt:ST.sel?ST.sel.createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),timeline:ST.sel?ST.sel.timeline:[{time:new Date().toISOString(),action:"提交申请",user:ST.user.name}]};if(ST.sel){var idx=-1;for(var i=0;i<ST.reqs.length;i++){if(ST.reqs[i].id===ST.sel.id){idx=i;break}}if(idx>=0)ST.reqs[idx]=r}else{ST.reqs.push(r)}ST.sel=null;saveData();toast("提交成功","success");ST.tab="dashboard";render()}
function cancelEdit(){ST.sel=null;render()}
function viewReq(id){for(var i=0;i<ST.reqs.length;i++){if(ST.reqs[i].id===id){ST.sel=ST.reqs[i];break}}ST.modal="view";render()}
function renderApprove(){var p=[];for(var i=0;i<ST.reqs.length;i++){if(ST.reqs[i].status==="pending")p.push(ST.reqs[i])}if(p.length===0)return'<div class="card"><div class="card-header"><h2>待审批</h2></div><div class="card-body"><div class="empty">没有待审批的申请</div></div></div>';var html='<div class="card"><div class="card-header"><h2>待审批 ('+p.length+')</h2></div><div class="card-body"><div style="overflow-x:auto"><table><thead><tr><th>时间</th><th>部门</th><th>申请人</th><th>事由</th><th>出车</th><th>回来</th><th></th></tr></thead><tbody>';p.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt)});for(var i=0;i<p.length;i++){html+='<tr><td>'+fmt(p[i].createdAt)+'</td><td>'+eh(p[i].department)+'</td><td>'+eh(p[i].applicant)+'</td><td>'+eh(p[i].reason)+'</td><td>'+fmt(p[i].departureTime)+'</td><td>'+fmt(p[i].returnTime)+'</td><td><button class="btn btn-success btn-xs" onclick="approveReq('+"'"+p[i].id+"'"+')">批准</button> <button class="btn btn-danger btn-xs" onclick="rejectReq('+"'"+p[i].id+"'"+')">驳回</button> <button class="btn btn-secondary btn-xs" onclick="viewReq('+"'"+p[i].id+"'"+')">详情</button></td></tr>'}html+="</tbody></table></div></div></div>";return html}
function approveReq(id){for(var i=0;i<ST.reqs.length;i++){if(ST.reqs[i].id===id){ST.reqs[i].status="approved";ST.reqs[i].approver=ST.user.name;ST.reqs[i].updatedAt=new Date().toISOString();(ST.reqs[i].timeline=ST.reqs[i].timeline||[]).push({time:new Date().toISOString(),action:"审批通过",user:ST.user.name});break}};saveData();toast("已批准","success");render()}
function rejectReq(id){for(var i=0;i<ST.reqs.length;i++){if(ST.reqs[i].id===id){ST.reqs[i].status="rejected";ST.reqs[i].approver=ST.user.name;ST.reqs[i].updatedAt=new Date().toISOString();(ST.reqs[i].timeline=ST.reqs[i].timeline||[]).push({time:new Date().toISOString(),action:"审批驳回",user:ST.user.name});break}};saveData();toast("已驳回");render()}
function renderDispatch(){var td=[];for(var i=0;i<ST.reqs.length;i++){if(ST.reqs[i].status==="approved"||ST.reqs[i].status==="dispatched")td.push(ST.reqs[i])}if(td.length===0)return'<div class="card"><div class="card-header"><h2>派车管理</h2></div><div class="card-body"><div class="empty">没有需要派车的申请</div></div></div>';var html='<div class="card"><div class="card-header"><h2>派车管理</h2></div><div class="card-body"><div style="overflow-x:auto"><table><thead><tr><th>时间</th><th>部门</th><th>申请人</th><th>事由</th><th>出车</th><th>车型号牌</th><th>司机</th><th>状态</th><th></th></tr></thead><tbody>';td.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt)});for(var i=0;i<td.length;i++){html+='<tr><td>'+fmt(td[i].createdAt)+'</td><td>'+eh(td[i].department)+'</td><td>'+eh(td[i].applicant)+'</td><td>'+eh(td[i].reason)+'</td><td>'+fmt(td[i].departureTime)+'</td><td>'+eh(td[i].vehicleModel||"/")+' '+eh(td[i].plateNumber||"")+'</td><td>'+eh(td[i].driverName||"/")+'</td><td><span class="tag tag-'+stg(td[i].status)+'">'+stl(td[i].status)+'</span></td><td>'+(td[i].status==="approved"?'<button class="btn btn-primary btn-xs" onclick="dispatchVeh('+"'"+td[i].id+"'"+')">派车</button> ':'')+(td[i].status==="dispatched"?'<button class="btn btn-success btn-xs" onclick="completeTrip('+"'"+td[i].id+"'"+')">完成</button> ':'')+'<button class="btn btn-secondary btn-xs" onclick="editDisp('+"'"+td[i].id+"'"+')">编辑</button></td></tr>'}html+="</tbody></table></div></div></div>";return html}
function dispatchVeh(id){for(var i=0;i<ST.reqs.length;i++){if(ST.reqs[i].id===id){var r=ST.reqs[i];if(!r.vehicleModel||!r.driverName){toast("请先编辑车辆和司机","error");return}r.status="dispatched";r.dispatcher=ST.user.name;r.updatedAt=new Date().toISOString();(r.timeline=r.timeline||[]).push({time:new Date().toISOString(),action:"已派车",user:ST.user.name});break}};saveData();toast("派车成功","success");render()}
function completeTrip(id){for(var i=0;i<ST.reqs.length;i++){if(ST.reqs[i].id===id){ST.reqs[i].status="completed";ST.reqs[i].updatedAt=new Date().toISOString();(ST.reqs[i].timeline=ST.reqs[i].timeline||[]).push({time:new Date().toISOString(),action:"行程完成",user:ST.user.name});break}};saveData();toast("已完成","success");render()}
function editDisp(id){for(var i=0;i<ST.reqs.length;i++){if(ST.reqs[i].id===id){ST.sel=ST.reqs[i];break}}ST.modal="edit-dispatch";render()}
function renderAll(){var html='<div class="card"><div class="card-header"><h2>全部记录 ('+ST.reqs.length+')</h2></div><div class="card-body"><div class="filter-bar"><select id="alf" onchange="render()"><option value="">全部</option><option value="pending">待审批</option><option value="approved">已批准</option><option value="rejected">已驳回</option><option value="dispatched">已派车</option><option value="completed">已完成</option></select><input type="text" id="als" placeholder="搜索..." oninput="render()"></div>'+filteredTable()+'</div></div>';return html}
function filteredTable(){var list=ST.reqs.slice();var sf=document.getElementById("alf");var ss=document.getElementById("als");if(sf&&sf.value)list=list.filter(function(r){return r.status===sf.value});if(ss&&ss.value){var q=ss.value.toLowerCase();list=list.filter(function(r){return(r.applicant||"").toLowerCase().indexOf(q)>=0||(r.department||"").toLowerCase().indexOf(q)>=0||(r.reason||"").toLowerCase().indexOf(q)>=0})}return renderTable(list,true)}
function renderManage(){return'<div class="two-col"><div class="card"><div class="card-header"><h2>车辆管理 ('+ST.vehs.length+')</h2><button class="btn btn-primary btn-xs" onclick="openVM()">+ 添加</button></div><div class="card-body">'+(ST.vehs.length===0?'<div class="empty">暂无车辆</div>':'<table><thead><tr><th>品牌型号</th><th>车牌号</th><th>状态</th><th></th></tr></thead><tbody>'+ST.vehs.map(function(v){return'<tr><td>'+eh(v.model)+'</td><td>'+eh(v.plateNumber)+'</td><td>'+(v.status==="active"?'<span style="color:#388e3c">可用</span>':'<span style="color:#999">停用</span>')+'</td><td><button class="btn btn-secondary btn-xs" onclick="editVeh('+"'"+v.id+"'"+')">编辑</button> <button class="btn btn-danger btn-xs" onclick="delVeh('+"'"+v.id+"'"+')">删除</button></td></tr>'}).join("")+"</tbody></table>")+'</div></div><div class="card"><div class="card-header"><h2>司机管理 ('+ST.drvs.length+')</h2><button class="btn btn-primary btn-xs" onclick="openDM()">+ 添加</button></div><div class="card-body">'+(ST.drvs.length===0?'<div class="empty">暂无司机</div>':'<table><thead><tr><th>姓名</th><th>电话</th><th>状态</th><th></th></tr></thead><tbody>'+ST.drvs.map(function(d){return'<tr><td>'+eh(d.name)+'</td><td>'+eh(d.phone||"")+'</td><td>'+(d.status==="active"?'<span style="color:#388e3c">在职</span>':'<span style="color:#999">离职</span>')+'</td><td><button class="btn btn-secondary btn-xs" onclick="editDrv('+"'"+d.id+"'"+')">编辑</button> <button class="btn btn-danger btn-xs" onclick="delDrv('+"'"+d.id+"'"+')">删除</button></td></tr>'}).join("")+"</tbody></table>")+"</div></div></div>"}
function renderSettings(){return'<div class="card" style="max-width:580px"><div class="card-header"><h2>系统设置</h2></div><div class="card-body"><div class="set-sec"><h3>密码修改</h3><div class="fg" style="margin-bottom:8px"><label>当前密码</label><input type="password" id="st-op"></div><div class="fg" style="margin-bottom:8px"><label>新密码</label><input type="password" id="st-np"></div><div class="fg" style="margin-bottom:12px"><label>确认新密码</label><input type="password" id="st-cp"></div><button class="btn btn-primary" onclick="chPwd()">修改密码</button></div><div class="set-sec"><h3>数据管理</h3><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-secondary" onclick="expData()">导出备份</button><button class="btn btn-secondary" onclick="document.getElementById('+"'"+'ifile'+"'"+').click()">导入恢复</button><input type="file" id="ifile" style="display:none" accept=".json" onchange="impData(event)"><button class="btn btn-danger btn-xs" onclick="clrData()">清空数据</button></div></div></div></div>'}
function renderViewModal(){var r=ST.sel;return'<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal"><div class="modal-header"><h3>申请详情</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><span class="tag tag-'+stg(r.status)+'">'+stl(r.status)+'</span><div class="dg" style="margin-top:12px"><div class="di"><div class="dl">编号</div><div class="dv">'+r.id+'</div></div><div class="di"><div class="dl">时间</div><div class="dv">'+fmt(r.createdAt)+'</div></div><div class="di"><div class="dl">部门</div><div class="dv">'+eh(r.department)+'</div></div><div class="di"><div class="dl">申请人</div><div class="dv">'+eh(r.applicant)+'</div></div><div class="di"><div class="dl">事由</div><div class="dv">'+eh(r.reason)+'</div></div><div class="di"><div class="dl">地点</div><div class="dv">'+eh(r.destination)+'</div></div><div class="di"><div class="dl">出车</div><div class="dv">'+fmt(r.departureTime)+'</div></div><div class="di"><div class="dl">回来</div><div class="dv">'+fmt(r.returnTime)+'</div></div><div class="di"><div class="dl">审批人</div><div class="dv">'+eh(r.approver||"/")+'</div></div><div class="di"><div class="dl">派车人</div><div class="dv">'+eh(r.dispatcher||"/")+'</div></div><div class="di"><div class="dl">车型</div><div class="dv">'+eh(r.vehicleModel||"/")+'</div></div><div class="di"><div class="dl">车牌</div><div class="dv">'+eh(r.plateNumber||"/")+'</div></div><div class="di"><div class="dl">司机</div><div class="dv">'+eh(r.driverName||"/")+'</div></div></div>'+(r.timeline&&r.timeline.length>0?'<div style="margin-top:16px"><h4 style="font-size:13px;font-weight:600;margin-bottom:6px">审批进度</h4><ul class="timeline">'+r.timeline.map(function(t){return'<li><div class="t">'+fmt(t.time)+'</div>'+eh(t.action)+' - '+eh(t.user)+'</li>'}).join("")+"</ul></div>":"")+"</div></div></div>"}
function renderEditDispatchModal(){var r=ST.sel;return'<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal"><div class="modal-header"><h3>编辑派车</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><p style="margin-bottom:12px">'+eh(r.applicant)+' - '+eh(r.reason)+'</p><form onsubmit="saveDisp(event)"><div class="fg"><label>车辆</label><select id="df-v">';for(var i=0;i<ST.vehs.length;i++){html+='<option value="'+eh(ST.vehs[i].id)+'"'+(r.vehicleId===ST.vehs[i].id?" selected":"")+'>'+eh(ST.vehs[i].model)+' - '+eh(ST.vehs[i].plateNumber)+'</option>'}html+='</select></div><div class="fg"><label>司机</label><select id="df-d">';for(var i=0;i<ST.drvs.length;i++){html+='<option value="'+eh(ST.drvs[i].id)+'"'+(r.driverId===ST.drvs[i].id?" selected":"")+'>'+eh(ST.drvs[i].name)+'</option>'}html+='</select></div><div class="fg"><label>派车人</label><input type="text" id="df-p" value="'+eh(r.dispatcher||ST.user.name||"")+'"></div><div class="fa"><button type="submit" class="btn btn-primary">保存</button><button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button></div></form></div></div></div>'}
function renderEditDispatchModal(){var r=ST.sel;var h='<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal"><div class="modal-header"><h3>编辑派车</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><p style="margin-bottom:12px">'+eh(r.applicant)+' - '+eh(r.reason)+'</p><form onsubmit="saveDisp(event)"><div class="fg"><label>车辆</label><select id="df-v"><option value="">选择</option>';for(var i=0;i<ST.vehs.length;i++){h+='<option value="'+eh(ST.vehs[i].id)+'"'+(r.vehicleId===ST.vehs[i].id?" selected":"")+'>'+eh(ST.vehs[i].model)+' - '+eh(ST.vehs[i].plateNumber)+'</option>'}h+='</select></div><div class="fg"><label>司机</label><select id="df-d"><option value="">选择</option>';for(var i=0;i<ST.drvs.length;i++){h+='<option value="'+eh(ST.drvs[i].id)+'"'+(r.driverId===ST.drvs[i].id?" selected":"")+'>'+eh(ST.drvs[i].name)+'</option>'}h+='</select></div><div class="fg"><label>派车人</label><input type="text" id="df-p" value="'+eh(r.dispatcher||ST.user.name||"")+'"></div><div class="fa"><button type="submit" class="btn btn-primary">保存</button><button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button></div></form></div></div></div>';return h}
function saveDisp(ev){ev.preventDefault();var r=ST.sel;var vh=null;for(var i=0;i<ST.vehs.length;i++){if(ST.vehs[i].id===document.getElementById("df-v").value){vh=ST.vehs[i];break}}var dv=null;for(var i=0;i<ST.drvs.length;i++){if(ST.drvs[i].id===document.getElementById("df-d").value){dv=ST.drvs[i];break}}r.vehicleModel=vh?vh.model:"";r.plateNumber=vh?vh.plateNumber:"";r.vehicleId=vh?vh.id:"";r.driverName=dv?dv.name:"";r.driverId=dv?dv.id:"";r.dispatcher=document.getElementById("df-p").value.trim();r.updatedAt=new Date().toISOString();saveData();closeModal();toast("已更新","success")}
function renderVehicleModal(){var v=ST.editV;return'<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal" style="max-width:440px"><div class="modal-header"><h3>'+(v?"编辑":"添加")+'车辆</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><form onsubmit="saveVeh(event)"><div class="fg"><label>品牌型号</label><input type="text" id="vh-m" value="'+eh(v?v.model:"")+'" required></div><div class="fg"><label>车牌号</label><input type="text" id="vh-p" value="'+eh(v?v.plateNumber:"")+'" required></div><div class="fg"><label>状态</label><select id="vh-s"><option value="active"'+(v&&v.status!=="inactive"?" selected":"")+'>可用</option><option value="inactive"'+(v&&v.status==="inactive"?" selected":"")+'>停用</option></select></div><div class="fa"><button type="submit" class="btn btn-primary">保存</button><button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button></div></form></div></div></div>'}
function renderDriverModal(){var d=ST.editD;return'<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal" style="max-width:440px"><div class="modal-header"><h3>'+(d?"编辑":"添加")+'司机</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><form onsubmit="saveDrv(event)"><div class="fg"><label>姓名</label><input type="text" id="dr-n" value="'+eh(d?d.name:"")+'" required></div><div class="fg"><label>电话</label><input type="text" id="dr-p" value="'+eh(d?d.phone:"")+'"></div><div class="fg"><label>状态</label><select id="dr-s"><option value="active"'+(d&&d.status!=="inactive"?" selected":"")+'>在职</option><option value="inactive"'+(d&&d.status==="inactive"?" selected":"")+'>离职</option></select></div><div class="fa"><button type="submit" class="btn btn-primary">保存</button><button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button></div></form></div></div></div>'}
function openVM(v){ST.editV=v||null;ST.modal="vehicle";render()}
function openDM(d){ST.editD=d||null;ST.modal="driver";render()}
function editVeh(id){for(var i=0;i<ST.vehs.length;i++){if(ST.vehs[i].id===id){openVM(ST.vehs[i]);return}}}
function editDrv(id){for(var i=0;i<ST.drvs.length;i++){if(ST.drvs[i].id===id){openDM(ST.drvs[i]);return}}}
function saveVeh(ev){ev.preventDefault();var v={id:ST.editV?ST.editV.id:"vh_"+Date.now().toString(36),model:document.getElementById("vh-m").value.trim(),plateNumber:document.getElementById("vh-p").value.trim(),status:document.getElementById("vh-s").value};if(ST.editV){var idx=-1;for(var i=0;i<ST.vehs.length;i++){if(ST.vehs[i].id===ST.editV.id){idx=i;break}}if(idx>=0)ST.vehs[idx]=v}else{ST.vehs.push(v)}ST.editV=null;saveData();closeModal();toast("已保存","success")}
function saveDrv(ev){ev.preventDefault();var d={id:ST.editD?ST.editD.id:"dr_"+Date.now().toString(36),name:document.getElementById("dr-n").value.trim(),phone:document.getElementById("dr-p").value.trim(),status:document.getElementById("dr-s").value};if(ST.editD){var idx=-1;for(var i=0;i<ST.drvs.length;i++){if(ST.drvs[i].id===ST.editD.id){idx=i;break}}if(idx>=0)ST.drvs[idx]=d}else{ST.drvs.push(d)}ST.editD=null;saveData();closeModal();toast("已保存","success")}
function delVeh(id){if(!confirm("删除该车辆？"))return;ST.vehs=ST.vehs.filter(function(v){return v.id!==id});saveData();toast("已删除");render()}
function delDrv(id){if(!confirm("删除该司机？"))return;ST.drvs=ST.drvs.filter(function(d){return d.id!==id});saveData();toast("已删除");render()}
function chPwd(){var op=document.getElementById("st-op").value;var np=document.getElementById("st-np").value;var cp=document.getElementById("st-cp").value;var cu=null;for(var i=0;i<ST.users.length;i++){if(ST.users[i].name===ST.user.name){cu=ST.users[i];break}}var cur=cu?cu.password:"";if(op!==cur){toast("当前密码错误","error");return}if(!np||np.length<4){toast("新密码至少4位","error");return}if(np!==cp){toast("两次密码不一致","error");return}for(var i=0;i<ST.users.length;i++){if(ST.users[i].name===ST.user.name){ST.users[i].password=np;break}}saveData(true);toast("密码已修改","success")}
function expData(){var d={requests:ST.reqs,vehicles:ST.vehs,drivers:ST.drvs,config:{users:ST.users}};var b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download="backup_"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(u);toast("已导出","success")}
function impData(ev){var f=ev.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(!d.requests||!Array.isArray(d.requests))throw new Error("fmt");ST.reqs=d.requests;ST.vehs=d.vehicles||[];ST.drvs=d.drivers||[];if(d.config&&d.config.users)ST.users=d.config.users;saveData(true);toast("导入成功: "+ST.reqs.length+" 条","success");render()}catch(er){toast("格式错误","error")}};r.readAsText(f)}
function clrData(){if(!confirm("确认清空所有数据？不可恢复！"))return;ST.reqs=[];ST.vehs=[];ST.drvs=[];saveData(true);toast("已清空");render()}
function closeModal(){ST.modal=null;ST.sel=null;ST.editV=null;ST.editD=null;render()}
function cancelEdit(){ST.sel=null;render()}
function renderSettingsModal(){return'<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal" style="max-width:460px"><div class="modal-header"><h3>设置</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><div class="set-sec"><h3>用户信息</h3><div class="dg"><div class="di"><div class="dl">用户名</div><div class="dv">'+eh(ST.user.name)+'</div></div><div class="di"><div class="dl">角色</div><div class="dv">'+rn(ST.user.role)+'</div></div></div></div><div class="set-sec"><h3>密码修改</h3><div class="fg" style="margin-bottom:8px"><label>当前密码</label><input type="password" id="st-op"></div><div class="fg" style="margin-bottom:8px"><label>新密码</label><input type="password" id="st-np"></div><div class="fg" style="margin-bottom:12px"><label>确认新密码</label><input type="password" id="st-cp"></div><button class="btn btn-primary" onclick="chPwd()">修改密码</button></div><div class="set-sec"><h3>数据同步</h3><p style="font-size:12px;color:#888;margin-bottom:8px">配置GitHub Token可同步数据到云端</p><div class="fg" style="margin-bottom:6px"><label>GitHub Token</label><input type="password" id="st-gt" value="'+(CFG.token||"")+'" placeholder="输入Token"></div><button class="btn btn-primary" onclick="saveGithubToken()">保存令牌</button></div><div class="set-sec" style="border-top:1px solid #eee;padding-top:16px;margin-top:16px"><button class="btn btn-danger" onclick="doLogout();closeModal()">退出登录</button></div></div></div></div>'}
function saveGithubToken(){var t=document.getElementById("st-gt").value.trim();if(!t){toast("请输入GitHub Token","error");return}CFG.token=t;LS.set("vds_github_token",t);toast("令牌已保存","success")}
function bindEvents(){var btns=document.querySelectorAll(".nav button[data-tab]");for(var i=0;i<btns.length;i++){btns[i].onclick=function(t){return function(){ST.tab=t;ST.sel=null;render()}}(btns[i].getAttribute("data-tab"))}}

// ===== App Init =====
(function(){CFG.token=LS.get("vds_github_token")||"";var su=LS.getJson("vds_user",null);if(su){ST.user=su;loadData()}else{render()}})();

</script>
