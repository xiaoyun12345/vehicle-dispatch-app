<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>出车审批</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.header{background:#1a1a2e;color:#fff;padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:16px;font-weight:600;white-space:nowrap}
.nav{display:flex;gap:1px;height:100%;overflow-x:auto;scrollbar-width:none}
.nav button{background:none;border:none;color:#8888a8;padding:0 10px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.nav button.active{color:#4fc3f7;border-bottom:2px solid #4fc3f7}
.user-info{display:flex;align-items:center;gap:6px;font-size:12px;color:#b0b0c0;white-space:nowrap;flex-shrink:0}
.badge{background:#4fc3f7;color:#1a1a2e;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.header-btn{background:none;border:none;color:#b0b0c0;cursor:pointer;font-size:16px;padding:4px 6px;border-radius:4px}
.main{padding:16px;max-width:1400px;margin:0 auto}
.card{background:#fff;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e8e8ec;margin-bottom:14px}
.card-header{padding:12px 16px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-header h2{font-size:14px;font-weight:600}
.card-body{padding:16px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:6px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e8e8ec}
.stat-card .n{font-size:24px;font-weight:700}
.stat-card .l{font-size:11px;color:#888}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:600px}
th{background:#fafafa;padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:#666;border-bottom:2px solid #e8e8ec;white-space:nowrap}
td{padding:8px 10px;font-size:12px;border-bottom:1px solid #f0f0f0}
tr:hover{background:#fafcff}
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600}
.tag-pending{background:#fff3e0;color:#e65100}
.tag-approved{background:#e3f2fd;color:#1565c0}
.tag-rejected{background:#fce4ec;color:#c62828}
.tag-dispatched{background:#f3e5f5;color:#6a1b9a}
.tag-completed{background:#e8f5e9;color:#2e7d32}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;font-family:inherit;white-space:nowrap}
.btn-primary{background:#1976d2;color:#fff}
.btn-success{background:#388e3c;color:#fff}
.btn-danger{background:#d32f2f;color:#fff}
.btn-outline{background:#fff;color:#555;border-color:#ddd}
.btn-sm{padding:4px 8px;font-size:11px}
.btn-block{width:100%;justify-content:center}
form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:12px;font-weight:500;color:#555}
.fg input,.fg select,.fg textarea{padding:7px 9px;border:1px solid #ddd;border-radius:4px;font-size:13px;font-family:inherit}
.fg .err{color:#d32f2f;font-size:11px;min-height:16px}
.fa{grid-column:1/-1;display:flex;gap:8px;padding-top:4px;flex-wrap:wrap}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.dg .di{display:flex;flex-direction:column;gap:1px}
.dg .dl{font-size:11px;color:#888}
.dg .dv{font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:640px;max-height:90vh;overflow-y:auto}
.modal-header{padding:12px 16px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff}
.modal-header h3{font-size:14px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;color:#999;font-size:20px;padding:2px 6px;border-radius:4px}
.modal-body{padding:16px}
.loading-overlay{display:flex;align-items:center;justify-content:center;padding:40px;color:#999;font-size:14px}
.spinner{width:22px;height:22px;border:3px solid #e0e0e0;border-top-color:#1976d2;border-radius:50%;animation:spin .8s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:12px;right:12px;z-index:300;padding:10px 16px;border-radius:5px;color:#fff;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideIn .3s ease;max-width:320px}
.toast-ok{background:#2e7d32}
.toast-err{background:#c62828}
.toast-info{background:#1565c0}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.login-overlay{position:fixed;inset:0;background:#1a1a2e;z-index:500;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:8px;padding:32px;width:100%;max-width:360px}
.login-box h2{font-size:20px;margin-bottom:4px}
.login-box .sub{color:#888;font-size:13px;margin-bottom:16px}
.login-box .fg{margin-bottom:12px}
.timeline{list-style:none;padding:0;margin:8px 0}
.timeline li{padding:6px 0;border-left:2px solid #e0e0e0;padding-left:14px;margin-left:6px;font-size:12px;color:#666}
.timeline li .t{font-size:11px;color:#999}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{padding:5px 8px;border:1px solid #ddd;border-radius:4px;font-size:12px;font-family:inherit}
.empty{text-align:center;padding:40px 16px;color:#999;font-size:13px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:768px){.header{padding:0 10px;height:44px}.header h1{font-size:14px}.nav button{padding:0 6px;font-size:11px}.main{padding:10px}.stats-grid{grid-template-columns:1fr 1fr}form{grid-template-columns:1fr}.dg{grid-template-columns:1fr}.card-body{padding:12px}.two-col{grid-template-columns:1fr}}
@media(max-width:480px){.login-box{padding:24px 16px}.login-box h2{font-size:18px}.fg input,.fg select{padding:9px 8px;font-size:14px}.btn{padding:9px 14px;font-size:13px}.stats-grid{gap:8px}.stat-card{padding:10px}.stat-card .n{font-size:20px}}
</style>
</head>
<body>
<div id="app"><div class="loading-overlay"><div class="spinner"></div>加载中...</div></div>
<script>/* Config */
var CFG={githubOwner:"xiaoyun12345",githubRepo:"vehicle-dispatch-app",githubToken:String.fromCharCode(103,104,112,95,105,109,88,108,71,74,108,117,120,56,116,72,121,116,98,76,90,120,105,66,87,98,119,53,117,88,108,98,57,51,48,89,74,112,105,75),dataPath:"data.json",apiBase:"https://api.github.com",storageKey:"vds_app"};
/* RBAC Role definition */
var ROLES={applicant:{label:"申请人",level:1},approver:{label:"审批人",level:2},dispatcher:{label:"派车人",level:3},admin:{label:"管理员",level:99}};
function roleLabel(r){return ROLES[r]?ROLES[r].label:r}
function hasRole(user,role){if(!user||!user.role)return false;if(user.role==="admin")return true;var ul=ROLES[user.role]?ROLES[user.role].level:0;var rl=ROLES[role]?ROLES[role].level:0;return ul>=rl}
/* State */
var S={user:null,users:[],reqs:[],vehs:[],drvs:[],cfg:{},tab:"dashboard",regMode:false,modal:null,sel:null,sync:"idle",load:false,editV:null,editD:null,settingsView:null};
/* Utilities */
function genId(){return"rq_"+Date.now().toString(36)+"_"+Math.random().toString(36).substring(2,8)}
function fmtDate(t){if(!t)return"";var d=new Date(t);return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate())+" "+pad2(d.getHours())+":"+pad2(d.getMinutes())}
function pad2(n){return n<10?"0"+n:""+n}
function statusLabel(s){var m={pending:"待审批",approved:"已批准",rejected:"已驳回",dispatched:"已派车",completed:"已完成"};return m[s]||s}
function escHtml(s){if(!s)return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function toast(msg,t){t=t||"info";var el=document.createElement("div");el.className="toast toast-"+(t==="success"?"ok":t==="error"?"err":"info");el.textContent=msg;document.body.appendChild(el);setTimeout(function(){el.style.opacity="0";el.style.transition="opacity .3s";setTimeout(function(){el.remove()},300)},2500)}
/* Local Storage */
function loadLocal(){try{return JSON.parse(localStorage.getItem(CFG.storageKey)||'{"reqs":[],"vehs":[],"drvs":[]}')}catch(e){return{reqs:[],vehs:[],drvs:[]}}}
function saveLocal(d){localStorage.setItem(CFG.storageKey,JSON.stringify(d))}
function saveSession(){if(S.user)localStorage.setItem(CFG.storageKey+"_session",JSON.stringify(S.user))}
function loadSession(){try{var s=localStorage.getItem(CFG.storageKey+"_session");return s?JSON.parse(s):null}catch(e){return null}}
function clearSession(){localStorage.removeItem(CFG.storageKey+"_session")}
/* GitHub API */
var API={_sha:null};
API.read=function(){var s=this;return fetch(CFG.apiBase+"/repos/"+CFG.githubOwner+"/"+CFG.githubRepo+"/contents/"+CFG.dataPath,{headers:{Authorization:"token "+CFG.githubToken,Accept:"application/vnd.github.v3+json"}}).then(function(r){if(!r.ok){if(r.status===404)return{requests:[],vehicles:[],drivers:[],config:{}};throw new Error("read fail "+r.status)}return r.json()}).then(function(d){s._sha=d.sha;return JSON.parse(decodeURIComponent(escape(atob(d.content))))}).catch(function(e){console.error("GitHub read:",e);return null})};
API.write=function(data){var s=this;var raw=unescape(encodeURIComponent(JSON.stringify(data)));var c=btoa(raw);var b={message:"update data",content:c};if(s._sha)b.sha=s._sha;return fetch(CFG.apiBase+"/repos/"+CFG.githubOwner+"/"+CFG.githubRepo+"/contents/"+CFG.dataPath,{method:"PUT",headers:{Authorization:"token "+CFG.githubToken,Accept:"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify(b)}).then(function(r){if(!r.ok){if(r.status===409){s._sha=null;return s.write(data)}throw new Error("write fail "+r.status)}return r.json()}).then(function(d){s._sha=d.content.sha;return true}).catch(function(e){console.error("GitHub write:",e);return false})};
/* Data load/save */
function loadData(){S.load=true;R();var tid=setTimeout(function(){if(!S.users||S.users.length===0){S.users=[{name:"管理员",password:"123456",role:"admin"}];S.cfg.users=S.users}S.load=false;R()},5000);API.read().then(function(d){clearTimeout(tid);if(d){S.reqs=d.requests||[];S.vehs=d.vehicles||[];S.drvs=d.drivers||[];S.cfg=d.config||{};S.users=S.cfg.users||[];S.sync="ok"}else{S.sync="err";if(!S.users||S.users.length===0){S.users=[{name:"管理员",password:"123456",role:"admin"}];S.cfg.users=S.users}}S.load=false;R()})}
function saveData(){var d={requests:S.reqs,vehicles:S.vehs,drivers:S.drvs,config:S.cfg};S.sync="saving";R();API.write(d).then(function(ok){S.sync=ok?"ok":"err";if(ok)saveLocal(d);R()})}
/* Main render */
function R(){var a=document.getElementById("app");if(S.load){a.innerHTML='<div class="loading-overlay"><div class="spinner"></div>加载中...</div>';return}if(!S.user){a.innerHTML=RL();return}var tabs=getTabs();if(!tabs.find(function(t){return t.id===S.tab}))S.tab=tabs[0]?tabs[0].id:"dashboard";a.innerHTML=RH(tabs)+'<div class="main">'+RC()+"</div>"+(S.modal?RM():"");BE()}
/* Login/Register render */
function RL(){if(S.regMode){return'<div class="login-overlay"><div class="login-box"><h2>出车审批</h2><p class="sub">注册新账号</p><div class="fg"><label>用户名</label><input type="text" id="rg-user" placeholder="输入您的姓名"><span class="err" id="rg-user-err"></span></div><div class="fg"><label>密码（至少6位）</label><input type="password" id="rg-pwd" placeholder="至少6位密码"><span class="err" id="rg-pwd-err"></span></div><div class="fg"><label>确认密码</label><input type="password" id="rg-pwd2" placeholder="再次输入密码"><span class="err" id="rg-pwd2-err"></span></div><div class="fg"><label>职位选择</label><select id="rg-role"><option value="">请选择</option><option value="applicant">申请人</option><option value="approver">审批人</option><option value="dispatcher">派车人</option></select></div><button class="btn btn-primary btn-block" onclick="doRegister()">注册</button><p style="font-size:11px;color:#aaa;text-align:center;margin-top:10px">已有账号？<a href="#" onclick="S.regMode=false;R()" style="color:#1976d2">登录</a></p></div></div>'}return'<div class="login-overlay"><div class="login-box"><h2>出车审批</h2><p class="sub">公司用车申请与审批</p><div class="fg"><label>用户名</label><input type="text" id="li-user" placeholder="输入您的姓名"><span class="err" id="li-user-err"></span></div><div class="fg"><label>密码</label><input type="password" id="li-pwd" placeholder="默认密码: 123456"><span class="err" id="li-pwd-err"></span></div><div class="fg"><label>职位选择</label><select id="li-role"><option value="">请选择</option><option value="applicant">申请人</option><option value="approver">审批人</option><option value="dispatcher">派车人</option><option value="admin">管理员</option></select></div><button class="btn btn-primary btn-block" onclick="doLogin()">进入系统</button><p style="font-size:11px;color:#aaa;text-align:center;margin-top:12px">没有账号？<a href="#" onclick="S.regMode=true;R()" style="color:#1976d2">注册</a></p><p style="font-size:11px;color:#aaa;text-align:center;margin-top:4px">默认管理员: 管理员 / 123456</p></div></div>'}
/* RBAC Tab control */
function getTabs(){var tabs=[];if(!S.user)return tabs;if(hasRole(S.user,"applicant")){tabs.push({id:"dashboard",label:"我的申请"});tabs.push({id:"new-request",label:"新建申请"})}if(hasRole(S.user,"approver"))tabs.push({id:"approve",label:"待审批"});if(hasRole(S.user,"dispatcher"))tabs.push({id:"dispatch",label:"派车管理"});if(hasRole(S.user,"admin")){tabs.push({id:"all",label:"全部记录"});tabs.push({id:"manage",label:"基础数据"})}tabs.push({id:"settings",label:"系统设置"})var seen={};return tabs.filter(function(t){return seen[t.id]?false:(seen[t.id]=true)})}
function RH(tabs){var sy=S.sync==="ok"?'<span style="color:#4caf50">&#9679;</span>':S.sync==="saving"?"...":'<span style="color:#f44336">&#9679;</span>';return'<div class="header"><h1>出车审批</h1><div class="nav">'+tabs.map(function(t){return'<button class="'+(S.tab===t.id?"active":"")+'" data-tab="'+t.id+'">'+t.label+"</button>"}).join("")+'</div><div class="user-info">'+sy+" "+escHtml(S.user.name)+' <span class="badge">'+roleLabel(S.user.role)+'</span><button class="header-btn" onclick="switchTab('settings')" title="设置">&#9881;</button></div></div>'}
function RC(){switch(S.tab){case"dashboard":return RD();case"new-request":return RNR();case"approve":return RAP();case"dispatch":return RDP();case"all":return RAL();case"manage":return RMG();case"settings":return RST();default:return RD()}}
function RT(list,sa){if(list.length===0)return'<div class="empty">暂无记录</div>';var sl=list.slice().sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt)});return'<div class="table-wrap"><table><thead><tr><th>时间</th><th>部门</th><th>申请人</th><th>事由</th><th>地点</th><th>出车</th><th>回来</th><th>车型号牌</th><th>司机</th><th>审批人</th><th>派车人</th><th>状态</th>'+(sa?"<th></th>":"")+"</tr></thead><tbody>"+sl.map(function(r){return"<tr>"+"<td>"+fmtDate(r.createdAt)+"</td><td>"+escHtml(r.department)+"</td><td>"+escHtml(r.applicant)+"</td><td>"+escHtml(r.reason)+"</td><td>"+escHtml(r.destination)+"</td><td>"+fmtDate(r.departureTime)+"</td><td>"+fmtDate(r.returnTime)+"</td><td>"+escHtml(r.vehicleModel||"")+" "+escHtml(r.plateNumber||"")+"</td><td>"+escHtml(r.driverName||"")+"</td><td>"+escHtml(r.approver||"")+"</td><td>"+escHtml(r.dispatcher||"")+'</td><td><span class="tag tag-'+(r.status==="pending"?"pending":r.status==="approved"?"approved":r.status==="rejected"?"rejected":r.status==="dispatched"?"dispatched":"completed")+'">'+statusLabel(r.status)+"</span></td>"+(sa?'<td><button class="btn btn-outline btn-sm" onclick="viewReq(\''+r.id+'\')">详情</button></td>':"")+"</tr>"}).join("")+"</tbody></table></div>"}
function RD(){var my=S.reqs.filter(function(r){return r.applicant===S.user.name});var s={total:my.length,pending:my.filter(function(r){return r.status==="pending"}).length,ok:my.filter(function(r){return r.status==="approved"||r.status==="dispatched"}).length,no:my.filter(function(r){return r.status==="rejected"}).length,done:my.filter(function(r){return r.status==="completed"}).length};return'<div class="stats-grid"><div class="stat-card"><div class="n">'+s.total+'</div><div class="l">申请总数</div></div><div class="stat-card"><div class="n">'+s.pending+'</div><div class="l">待审批</div></div><div class="stat-card"><div class="n">'+s.ok+'</div><div class="l">已通过</div></div><div class="stat-card"><div class="n">'+s.no+'</div><div class="l">已驳回</div></div><div class="stat-card"><div class="n">'+s.done+'</div><div class="l">已完成</div></div></div><div class="card"><div class="card-header"><h2>我的申请</h2><button class="btn btn-primary btn-sm" onclick="switchTab(\'new-request\')">+ 新建</button></div><div class="card-body">'+RT(my,true)+"</div></div>"}
function RNR(){var e=S.sel;var d=e||{};return'<div class="card"><div class="card-header"><h2>'+(e?"编辑":"新建")+'出车申请</h2><button class="btn btn-outline btn-sm" onclick="switchTab(\'dashboard\')">← 返回首页</button></div><div class="card-body"><form onsubmit="submitReq(event)"><div class="fg"><label>用车部门 *</label><input type="text" id="rf-dpt" value="'+escHtml(d.department||"")+'" required></div><div class="fg"><label>申请人 *</label><input type="text" id="rf-app" value="'+escHtml(d.applicant||S.user.name||"")+'" required></div><div class="fg"><label>申请事由 *</label><input type="text" id="rf-rsn" value="'+escHtml(d.reason||"")+'" required></div><div class="fg"><label>出车地点 *</label><input type="text" id="rf-dst" value="'+escHtml(d.destination||"")+'" required></div><div class="fg"><label>出车时间 *</label><input type="datetime-local" id="rf-dep" value="'+(d.departureTime||"")+'" required></div><div class="fg"><label>预计回来 *</label><input type="datetime-local" id="rf-ret" value="'+(d.returnTime||"")+'" required></div><div class="fg"><label>审批人</label><input type="text" id="rf-apr" value="'+escHtml(d.approver||"")+'" placeholder="审批人姓名"></div><div class="fg"><label>派车人</label><input type="text" id="rf-dps" value="'+escHtml(d.dispatcher||"")+'" placeholder="派车人姓名"></div><div class="fg"><label>车辆</label><input type="text" id="rf-veh" value="'+escHtml(d.vehicleModel||"")+'" placeholder="车型号牌"></div><div class="fg"><label>司机</label><input type="text" id="rf-drv" value="'+escHtml(d.driverName||"")+'" placeholder="司机姓名"></div><div class="fa"><button type="submit" class="btn btn-primary">提交</button>'+(e?'<button type="button" class="btn btn-outline" onclick="cancelEdit()">取消</button>':"")+"</div></form></div></div>"}
function submitReq(e){e.preventDefault();var r={id:S.sel?S.sel.id:genId(),department:document.getElementById("rf-dpt").value.trim(),applicant:document.getElementById("rf-app").value.trim(),reason:document.getElementById("rf-rsn").value.trim(),destination:document.getElementById("rf-dst").value.trim(),departureTime:document.getElementById("rf-dep").value,returnTime:document.getElementById("rf-ret").value,approver:document.getElementById("rf-apr").value.trim(),dispatcher:document.getElementById("rf-dps").value.trim(),vehicleModel:document.getElementById("rf-veh").value.trim(),plateNumber:"",driverName:document.getElementById("rf-drv").value.trim(),status:S.sel?S.sel.status:"pending",createdAt:S.sel?S.sel.createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),timeline:S.sel?S.sel.timeline:[{time:new Date().toISOString(),action:"提交申请",user:S.user.name}]};if(S.sel){var i=S.reqs.findIndex(function(x){return x.id===S.sel.id});if(i>=0)S.reqs[i]=r}else{S.reqs.push(r)}S.sel=null;saveData();toast("提交成功","success");switchTab("dashboard")}
function cancelEdit(){S.sel=null;R()}
function RAP(){var p=S.reqs.filter(function(r){return r.status==="pending"});return'<div class="card"><div class="card-header"><h2>待审批 ('+p.length+')</h2></div><div class="card-body">'+(p.length===0?'<div class="empty">没有待审批的申请</div>':'<div class="table-wrap"><table><thead><tr><th>时间</th><th>部门</th><th>申请人</th><th>事由</th><th>出车</th><th>回来</th><th></th></tr></thead><tbody>'+p.slice().sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt)}).map(function(r){return"<tr><td>"+fmtDate(r.createdAt)+"</td><td>"+escHtml(r.department)+"</td><td>"+escHtml(r.applicant)+"</td><td>"+escHtml(r.reason)+"</td><td>"+fmtDate(r.departureTime)+"</td><td>"+fmtDate(r.returnTime)+'</td><td><button class="btn btn-success btn-sm" onclick="approveReq(\''+r.id+'\')">批准</button> <button class="btn btn-danger btn-sm" onclick="rejectReq(\''+r.id+'\')">驳回</button> <button class="btn btn-outline btn-sm" onclick="viewReq(\''+r.id+'\')">详情</button></td></tr>'}).join("")+"</tbody></table></div>")+"</div></div>"}
function approveReq(id){var r=S.reqs.find(function(x){return x.id===id});if(!r)return;r.status="approved";r.approver=S.user.name;r.updatedAt=new Date().toISOString();if(!r.timeline)r.timeline=[];r.timeline.push({time:new Date().toISOString(),action:"审批通过",user:S.user.name});saveData();toast("已批准","success");R()}
function rejectReq(id){var r=S.reqs.find(function(x){return x.id===id});if(!r)return;r.status="rejected";r.approver=S.user.name;r.updatedAt=new Date().toISOString();if(!r.timeline)r.timeline=[];r.timeline.push({time:new Date().toISOString(),action:"审批驳回",user:S.user.name});saveData();toast("已驳回");R()}
function RDP(){var list=S.reqs.filter(function(r){return r.status==="approved"||r.status==="dispatched"});return'<div class="card"><div class="card-header"><h2>派车管理 ('+list.length+')</h2></div><div class="card-body">'+(list.length===0?'<div class="empty">没有需要派车的申请</div>':'<div class="table-wrap"><table><thead><tr><th>时间</th><th>部门</th><th>申请人</th><th>事由</th><th>出车</th><th>车型号牌</th><th>司机</th><th>状态</th><th></th></tr></thead><tbody>'+list.slice().sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt)}).map(function(r){return"<tr><td>"+fmtDate(r.createdAt)+"</td><td>"+escHtml(r.department)+"</td><td>"+escHtml(r.applicant)+"</td><td>"+escHtml(r.reason)+"</td><td>"+fmtDate(r.departureTime)+"</td><td>"+escHtml(r.vehicleModel||"/")+" "+escHtml(r.plateNumber||"")+"</td><td>"+escHtml(r.driverName||"/")+'</td><td><span class="tag tag-'+(r.status==="approved"?"approved":"dispatched")+'">'+statusLabel(r.status)+'</span></td><td>'+(r.status==="approved"?'<button class="btn btn-primary btn-sm" onclick="dispatchVeh(\''+r.id+'\')">派车</button> ':'')+(r.status==="dispatched"?'<button class="btn btn-success btn-sm" onclick="completeTrip(\''+r.id+'\')">完成</button> ':'')+'<button class="btn btn-outline btn-sm" onclick="editDisp(\''+r.id+'\')">编辑</button></td></tr>'}).join("")+"</tbody></table></div>")+"</div></div>"}
function dispatchVeh(id){var r=S.reqs.find(function(x){return x.id===id});if(!r)return;if(!r.vehicleModel||!r.driverName){toast("请先编辑车辆和司机","error");return}r.status="dispatched";r.dispatcher=S.user.name;r.updatedAt=new Date().toISOString();if(!r.timeline)r.timeline=[];r.timeline.push({time:new Date().toISOString(),action:"已派车",user:S.user.name});saveData();toast("派车成功","success");R()}
function completeTrip(id){var r=S.reqs.find(function(x){return x.id===id});if(!r)return;r.status="completed";r.updatedAt=new Date().toISOString();if(!r.timeline)r.timeline=[];r.timeline.push({time:new Date().toISOString(),action:"行程完成",user:S.user.name});saveData();toast("已完成","success");R()}
function editDisp(id){var r=S.reqs.find(function(x){return x.id===id});S.sel=r;S.modal="edit-dispatch";R()}
function viewReq(id){S.sel=S.reqs.find(function(r){return r.id===id});S.modal="view";R()}
function RAL(){return'<div class="card"><div class="card-header"><h2>全部记录 ('+S.reqs.length+')</h2></div><div class="card-body"><div class="filter-bar"><select id="alf" onchange="R()"><option value="">全部</option><option value="pending">待审批</option><option value="approved">已批准</option><option value="rejected">已驳回</option><option value="dispatched">已派车</option><option value="completed">已完成</option></select><input type="text" id="als" placeholder="搜索..." oninput="R()"></div>'+ARF()+"</div></div>"}
function ARF(){var list=S.reqs.slice();var sf=document.getElementById("alf");var ss=document.getElementById("als");if(sf&&sf.value)list=list.filter(function(r){return r.status===sf.value});if(ss&&ss.value){var q=ss.value.toLowerCase();list=list.filter(function(r){return(r.applicant||"").toLowerCase().indexOf(q)>=0||(r.department||"").toLowerCase().indexOf(q)>=0||(r.reason||"").toLowerCase().indexOf(q)>=0})}return RT(list,true)}
function RMG(){return'<div class="two-col"><div class="card"><div class="card-header"><h2>车辆管理 ('+S.vehs.length+')</h2><button class="btn btn-primary btn-sm" onclick="openVM()">+ 添加</button></div><div class="card-body">'+(S.vehs.length===0?'<div class="empty">暂无车辆</div>':'<table><thead><tr><th>品牌型号</th><th>车牌号</th><th>状态</th><th></th></tr></thead><tbody>'+S.vehs.map(function(v){return'<tr><td>'+escHtml(v.model)+'</td><td>'+escHtml(v.plateNumber)+'</td><td>'+(v.status==="active"?'<span style="color:#388e3c">可用</span>':'<span style="color:#999">停用</span>')+'</td><td><button class="btn btn-outline btn-sm" onclick="editVeh(\''+v.id+'\')">编辑</button> <button class="btn btn-danger btn-sm" onclick="delVeh(\''+v.id+'\')">删除</button></td></tr>'}).join("")+'</tbody></table>')+'</div></div><div class="card"><div class="card-header"><h2>司机管理 ('+S.drvs.length+')</h2><button class="btn btn-primary btn-sm" onclick="openDM()">+ 添加</button></div><div class="card-body">'+(S.drvs.length===0?'<div class="empty">暂无司机</div>':'<table><thead><tr><th>姓名</th><th>电话</th><th>状态</th><th></th></tr></thead><tbody>'+S.drvs.map(function(d){return'<tr><td>'+escHtml(d.name)+'</td><td>'+escHtml(d.phone||"")+'</td><td>'+(d.status==="active"?'<span style="color:#388e3c">在职</span>':'<span style="color:#999">离职</span>')+'</td><td><button class="btn btn-outline btn-sm" onclick="editDrv(\''+d.id+'\')">编辑</button> <button class="btn btn-danger btn-sm" onclick="delDrv(\''+d.id+'\')">删除</button></td></tr>'}).join("")+'</tbody></table>')+"</div></div></div>"}
function RST(){if(S.settingsView==="account"){return'<div class="card" style="max-width:520px"><div class="card-header"><h2>账号设置</h2></div><div class="card-body"><div class="set-sec"><h3 style="font-size:14px;font-weight:600;margin-bottom:8px">用户信息</h3><div class="dg"><div class="di"><div class="dl">用户名</div><div class="dv">'+escHtml(S.user.name)+'</div></div><div class="di"><div class="dl">角色</div><div class="dv">'+roleLabel(S.user.role)+'</div></div></div></div><div class="set-sec" style="border-top:1px solid #eee;padding-top:12px;margin-top:12px"><h3 style="font-size:14px;font-weight:600;margin-bottom:8px">密码修改</h3><div class="fg" style="margin-bottom:8px"><label>当前密码</label><input type="password" id="st-op"></div><div class="fg" style="margin-bottom:8px"><label>新密码</label><input type="password" id="st-np"></div><div class="fg" style="margin-bottom:10px"><label>确认新密码</label><input type="password" id="st-cp"></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-primary" onclick="chPwd()">修改密码</button><button class="btn btn-outline" onclick="S.settingsView=null;R()">← 返回设置</button></div></div></div></div>'}return'<div class="card" style="max-width:520px"><div class="card-header"><h2>系统设置</h2></div><div class="card-body"><div class="set-sec" style="cursor:pointer;padding:8px 0;border-bottom:1px solid #eee" onclick="S.settingsView=\'account\';R()"><h3 style="font-size:14px;font-weight:600;margin:0">账号设置</h3><p style="font-size:12px;color:#888;margin:2px 0 0">修改密码、查看用户信息</p></div><div class="set-sec" style="padding-top:16px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-danger" onclick="doLogout()">退出登录</button></div></div></div>'}
function chPwd(){var op=document.getElementById("st-op").value;var np=document.getElementById("st-np").value;var cp=document.getElementById("st-cp").value;var cu=null;for(var i=0;i<S.users.length;i++){if(S.users[i].name===S.user.name){cu=S.users[i];break}}if(!cu){toast("用户不存在","error");return}if(op!==cu.password){toast("当前密码错误","error");return}if(!np||np.length<6){toast("新密码至少6位","error");return}if(np!==cp){toast("两次密码不一致","error");return}cu.password=np;saveData();toast("密码已修改","success")}
function RM(){if(S.modal==="view")return RVM();if(S.modal==="edit-dispatch")return REDM();if(S.modal==="vehicle")return RVHM();if(S.modal==="driver")return RDRM();return""}
function RVM(){var r=S.sel;if(!r)return"";return'<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal"><div class="modal-header"><h3>申请详情</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><span class="tag tag-'+(r.status==="pending"?"pending":r.status==="approved"?"approved":r.status==="rejected"?"rejected":r.status==="dispatched"?"dispatched":"completed")+'">'+statusLabel(r.status)+'</span><div class="dg" style="margin-top:10px"><div class="di"><div class="dl">编号</div><div class="dv">'+r.id+'</div></div><div class="di"><div class="dl">时间</div><div class="dv">'+fmtDate(r.createdAt)+'</div></div><div class="di"><div class="dl">部门</div><div class="dv">'+escHtml(r.department)+'</div></div><div class="di"><div class="dl">申请人</div><div class="dv">'+escHtml(r.applicant)+'</div></div><div class="di"><div class="dl">事由</div><div class="dv">'+escHtml(r.reason)+'</div></div><div class="di"><div class="dl">地点</div><div class="dv">'+escHtml(r.destination)+'</div></div><div class="di"><div class="dl">出车</div><div class="dv">'+fmtDate(r.departureTime)+'</div></div><div class="di"><div class="dl">回来</div><div class="dv">'+fmtDate(r.returnTime)+'</div></div><div class="di"><div class="dl">审批人</div><div class="dv">'+escHtml(r.approver||"/")+'</div></div><div class="di"><div class="dl">派车人</div><div class="dv">'+escHtml(r.dispatcher||"/")+'</div></div><div class="di"><div class="dl">车型</div><div class="dv">'+escHtml(r.vehicleModel||"/")+'</div></div><div class="di"><div class="dl">车牌</div><div class="dv">'+escHtml(r.plateNumber||"/")+'</div></div><div class="di"><div class="dl">司机</div><div class="dv">'+escHtml(r.driverName||"/")+'</div></div></div>'+(r.timeline&&r.timeline.length>0?'<div style="margin-top:14px"><h4 style="font-size:13px;font-weight:600;margin-bottom:6px">审批进度</h4><ul class="timeline">'+r.timeline.map(function(t){return'<li><div class="t">'+fmtDate(t.time)+"</div>"+escHtml(t.action)+" - "+escHtml(t.user)+"</li>"}).join("")+"</ul></div>":"")+"</div></div></div>"}
function REDM(){var r=S.sel;if(!r)return"";return'<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal"><div class="modal-header"><h3>编辑派车信息</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><p style="margin-bottom:12px">'+escHtml(r.applicant)+" - "+escHtml(r.reason)+'</p><form onsubmit="saveDisp(event)"><div class="fg"><label>车辆</label><input type="text" id="df-veh" value="'+escHtml(r.vehicleModel||"")+'" placeholder="车型号牌"></div><div class="fg"><label>司机</label><input type="text" id="df-drv" value="'+escHtml(r.driverName||"")+'" placeholder="司机姓名"></div><div class="fg"><label>派车人</label><input type="text" id="df-p" value="'+escHtml(r.dispatcher||S.user.name||"")+'"></div><div class="fa"><button type="submit" class="btn btn-primary">保存</button><button type="button" class="btn btn-outline" onclick="closeModal()">取消</button></div></form></div></div></div>'}
function saveDisp(e){e.preventDefault();var r=S.sel;if(!r)return;r.vehicleModel=document.getElementById("df-veh").value.trim();r.driverName=document.getElementById("df-drv").value.trim();r.dispatcher=document.getElementById("df-p").value.trim();r.updatedAt=new Date().toISOString();saveData();closeModal();toast("已更新","success")}
function RVHM(){var v=S.editV;return'<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal" style="max-width:420px"><div class="modal-header"><h3>'+(v?"编辑":"添加")+'车辆</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><form onsubmit="saveVeh(event)"><div class="fg"><label>品牌型号</label><input type="text" id="vh-m" value="'+escHtml(v?v.model:"")+'" required></div><div class="fg"><label>车牌号</label><input type="text" id="vh-p" value="'+escHtml(v?v.plateNumber:"")+'" required></div><div class="fg"><label>状态</label><select id="vh-s"><option value="active"'+(v&&v.status!=="inactive"?" selected":"")+'>可用</option><option value="inactive"'+(v&&v.status==="inactive"?" selected":"")+'>停用</option></select></div><div class="fa"><button type="submit" class="btn btn-primary">保存</button><button type="button" class="btn btn-outline" onclick="closeModal()">取消</button></div></form></div></div></div>'}
function RDRM(){var d=S.editD;return'<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal" style="max-width:420px"><div class="modal-header"><h3>'+(d?"编辑":"添加")+'司机</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><form onsubmit="saveDrv(event)"><div class="fg"><label>姓名</label><input type="text" id="dr-n" value="'+escHtml(d?d.name:"")+'" required></div><div class="fg"><label>电话</label><input type="text" id="dr-p" value="'+escHtml(d?d.phone:"")+'"></div><div class="fg"><label>状态</label><select id="dr-s"><option value="active"'+(d&&d.status!=="inactive"?" selected":"")+'>在职</option><option value="inactive"'+(d&&d.status==="inactive"?" selected":"")+'>离职</option></select></div><div class="fa"><button type="submit" class="btn btn-primary">保存</button><button type="button" class="btn btn-outline" onclick="closeModal()">取消</button></div></form></div></div></div>'}
function openVM(v){S.editV=v||null;S.modal="vehicle";R()}
function openDM(d){S.editD=d||null;S.modal="driver";R()}
function editVeh(id){var v=S.vehs.find(function(x){return x.id===id});if(v)openVM(v)}
function editDrv(id){var d=S.drvs.find(function(x){return x.id===id});if(d)openDM(d)}
function saveVeh(e){e.preventDefault();var v={id:S.editV?S.editV.id:"vh_"+Date.now().toString(36),model:document.getElementById("vh-m").value.trim(),plateNumber:document.getElementById("vh-p").value.trim(),status:document.getElementById("vh-s").value};if(S.editV){var i=S.vehs.findIndex(function(x){return x.id===S.editV.id});if(i>=0)S.vehs[i]=v}else{S.vehs.push(v)}S.editV=null;saveData();closeModal();toast("已保存","success")}
function saveDrv(e){e.preventDefault();var d={id:S.editD?S.editD.id:"dr_"+Date.now().toString(36),name:document.getElementById("dr-n").value.trim(),phone:document.getElementById("dr-p").value.trim(),status:document.getElementById("dr-s").value};if(S.editD){var i=S.drvs.findIndex(function(x){return x.id===S.editD.id});if(i>=0)S.drvs[i]=d}else{S.drvs.push(d)}S.editD=null;saveData();closeModal();toast("已保存","success")}
function delVeh(id){if(!confirm("删除该车辆？"))return;S.vehs=S.vehs.filter(function(v){return v.id!==id});saveData();toast("已删除");R()}
function delDrv(id){if(!confirm("删除该司机？"))return;S.drvs=S.drvs.filter(function(d){return d.id!==id});saveData();toast("已删除");R()}
function closeModal(){S.modal=null;S.sel=null;S.editV=null;S.editD=null;R()}
function switchTab(t){S.tab=t;S.sel=null;S.settingsView=null;R()}
function doLogout(){S.user=null;S.tab="dashboard";clearSession();R()}
function doLogin(){var u=document.getElementById("li-user").value.trim();var p=document.getElementById("li-pwd").value;var r=document.getElementById("li-role").value;var eu=document.getElementById("li-user-err");var ep=document.getElementById("li-pwd-err");if(eu)eu.textContent="";if(ep)ep.textContent="";if(!u){if(eu)eu.textContent="请输入用户名";return}if(!p){if(ep)ep.textContent="请输入密码";return}if(!S.users||S.users.length===0)S.users=S.cfg.users||[{name:"管理员",password:"123456",role:"admin"}];var found=null;for(var i=0;i<S.users.length;i++){if(S.users[i].name===u){found=S.users[i];break}}if(!found){if(eu)eu.textContent="用户未注册";return}if(found.password!==p){if(ep)ep.textContent="密码错误";return}if(found.role!==r){toast("职位不匹配，请选择正确的职位","error");return}S.user={name:found.name,role:found.role};saveSession();loadData()}function doRegister(){var u=document.getElementById("rg-user").value.trim();var p=document.getElementById("rg-pwd").value;var p2=document.getElementById("rg-pwd2").value;var r=document.getElementById("rg-role").value;var eu=document.getElementById("rg-user-err");var ep=document.getElementById("rg-pwd-err");var ep2=document.getElementById("rg-pwd2-err");if(eu)eu.textContent="";if(ep)ep.textContent="";if(ep2)ep2.textContent="";if(!u){if(eu)eu.textContent="请输入用户名";return}if(!r){toast("请选择职位","error");return}if(!p||p.length<6){if(ep)ep.textContent="密码至少6位";return}if(p!==p2){if(ep2)ep2.textContent="两次密码不一致";return}if(!S.users)S.users=[];for(var i=0;i<S.users.length;i++){if(S.users[i].name===u){if(eu)eu.textContent="用户名已存在";return}}S.users.push({name:u,password:p,role:r});S.cfg.users=S.users;S.user={name:u,role:r};saveSession();saveData();toast("注册成功，已自动登录","success")}function BE(){var btns=document.querySelectorAll(".nav button[data-tab]");for(var i=0;i<btns.length;i++){(function(t){btns[i].onclick=function(){switchTab(t)}})(btns[i].dataset.tab)}}
/* Init - Login persistence */
(function(){var l=loadLocal();if(l.reqs&&l.reqs.length>0){S.reqs=l.reqs;S.vehs=l.vehs||[];S.drvs=l.drvs||[];S.cfg=l.cfg||{}}if(!S.users||S.users.length===0){S.users=[{name:"管理员",password:"123456",role:"admin"}];S.cfg.users=S.users}var session=loadSession();if(session&&session.name&&session.role){var found=false;for(var i=0;i<S.users.length;i++){if(S.users[i].name===session.name&&S.users[i].role===session.role){found=true;break}}if(found){S.user=session;loadData();return}}R()})();
</script>
