<script src="app.js"></script>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出车审批</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;display:flex;flex-direction:column}
.header{background:#1a1a2e;color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:18px;font-weight:600;letter-spacing:.5px;display:flex;align-items:center;gap:10px}
.header h1 svg{color:#4fc3f7}
.nav{display:flex;gap:4px;height:100%}
.nav button{background:none;border:none;color:#a0a0b8;padding:0 18px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:7px;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit;height:100%}
.nav button:hover{color:#d0d0e0;background:rgba(255,255,255,.04)}
.nav button.active{color:#4fc3f7;border-bottom-color:#4fc3f7}
.user-info{display:flex;align-items:center;gap:10px;font-size:13px;color:#b0b0c0}
.user-info .role-badge{background:#4fc3f7;color:#1a1a2e;padding:3px 10px;border-radius:3px;font-size:12px;font-weight:600}
.main{padding:24px;max-width:1400px;margin:0 auto;width:100%;flex:1}
.card{background:#fff;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e8e8ec}
.card-header{padding:16px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.card-header h2{font-size:16px;font-weight:600;color:#1a1a2e}
.card-body{padding:20px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:6px;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e8e8ec;display:flex;align-items:center;gap:14px}
.stat-card .stat-icon{width:44px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-card .stat-icon.blue{background:#e3f2fd;color:#1976d2}
.stat-card .stat-icon.green{background:#e8f5e9;color:#388e3c}
.stat-card .stat-icon.orange{background:#fff3e0;color:#f57c00}
.stat-card .stat-icon.red{background:#fce4ec;color:#d32f2f}
.stat-card .stat-icon.purple{background:#f3e5f5;color:#7b1fa2}
.stat-card .stat-value{font-size:26px;font-weight:700;line-height:1}
.stat-card .stat-label{font-size:13px;color:#888;margin-top:3px}
table{width:100%;border-collapse:collapse}
table th{background:#fafafa;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #e8e8ec;white-space:nowrap}
table td{padding:10px 14px;font-size:14px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
table tr:hover{background:#fafcff}
.status{display:inline-block;padding:4px 10px;border-radius:3px;font-size:12px;font-weight:600}
.status.pending{background:#fff3e0;color:#e65100}
.status.approved{background:#e8f5e9;color:#2e7d32}
.status.rejected{background:#fce4ec;color:#c62828}
.status.dispatched{background:#e3f2fd;color:#1565c0}
.status.completed{background:#f3e5f5;color:#6a1b9a}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:inherit;text-decoration:none;white-space:nowrap}
.btn-primary{background:#1976d2;color:#fff;border-color:#1976d2}
.btn-primary:hover{background:#1565c0}
.btn-success{background:#388e3c;color:#fff;border-color:#388e3c}
.btn-success:hover{background:#2e7d32}
.btn-danger{background:#d32f2f;color:#fff;border-color:#d32f2f}
.btn-danger:hover{background:#c62828}
.btn-outline{background:#fff;color:#555;border-color:#ddd}
.btn-outline:hover{background:#f5f5f5}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
form{display:grid;grid-template-columns:1fr 1fr;gap:16px}
form .full-width{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:13px;font-weight:500;color:#555}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid #ddd;border-radius:4px;font-size:14px;font-family:inherit;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#1976d2;box-shadow:0 0 0 3px rgba(25,118,210,.1)}
.form-group textarea{resize:vertical;min-height:80px}
.form-actions{grid-column:1/-1;display:flex;gap:10px;padding-top:8px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px}
.detail-grid .detail-item{display:flex;flex-direction:column;gap:2px}
.detail-grid .detail-item .dl{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.3px}
.detail-grid .detail-item .dv{font-size:14px;color:#1a1a2e}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:720px;max-height:90vh;overflow-y:auto}
.modal-header{padding:16px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:15px;font-weight:600}
.modal .modal-close{background:none;border:none;cursor:pointer;color:#999;padding:4px;border-radius:4px;display:flex}
.modal .modal-close:hover{color:#333;background:#f0f0f0}
.modal-body{padding:20px}
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{padding:7px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px;font-family:inherit}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:#1976d2}
.empty-state{text-align:center;padding:60px 20px;color:#999}
.empty-state svg{margin-bottom:12px;color:#ccc}
.empty-state p{font-size:14px}
.toast{position:fixed;top:20px;right:20px;z-index:300;padding:12px 20px;border-radius:6px;color:#fff;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideIn .3s ease;max-width:420px}
.toast.success{background:#2e7d32}
.toast.error{background:#c62828}
.toast.info{background:#1565c0}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.timeline{padding:0;list-style:none}
.timeline li{padding:10px 0 10px 28px;border-left:2px solid #e0e0e0;position:relative;margin-left:8px}
.timeline li::before{content:'';position:absolute;left:-6px;top:14px;width:10px;height:10px;border-radius:50%;background:#1976d2}
.timeline li:last-child{border-left-color:transparent}
.timeline .time{font-size:12px;color:#999}
.timeline .action{font-size:14px;margin-top:2px}
.tab-content{display:none}
.tab-content.active{display:block}
.settings-section{margin-top:20px}
.settings-section h3{font-size:15px;font-weight:600;margin-bottom:12px;color:#333}
.settings-section .form-group{margin-bottom:14px}
.loading{text-align:center;padding:40px;color:#999}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #e0e0e0;border-top-color:#1976d2;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:768px){.two-col{grid-template-columns:1fr}form{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}.header{padding:0 12px}.nav button{padding:0 10px;font-size:12px}.main{padding:12px}table{font-size:12px}table th,table td{padding:6px 8px}}
.login-overlay{position:fixed;inset:0;background:#1a1a2e;z-index:500;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:8px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h2{font-size:20px;margin-bottom:8px;color:#1a1a2e}
.login-box .subtitle{color:#888;font-size:14px;margin-bottom:24px}
.login-box .form-group{margin-bottom:16px}
.login-box .form-group label{display:block;margin-bottom:6px}
.login-box .form-group select,.login-box .form-group input{width:100%}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600}
.badge.urgent{background:#fce4ec;color:#c62828}
.sync-indicator{font-size:11px;color:#999;display:flex;align-items:center;gap:4px}
.sync-indicator .dot{width:6px;height:6px;border-radius:50%;background:#4caf50}
</style>
</head>
<body>
<div id="app"></div>
<script>
</script>
</body>
</html>
