<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<style>
body{font-family:sans-serif;background:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#fff;border-radius:8px;padding:40px;text-align:center;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.box h2{font-size:20px;margin-bottom:8px}
.box p{font-size:14px;color:#666;margin-bottom:20px}
.box input{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;margin-bottom:12px;font-size:14px;box-sizing:border-box}
.box select{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;margin-bottom:12px;font-size:14px;box-sizing:border-box}
.box button{width:100%;padding:10px;background:#1976d2;color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer}
.box button:hover{background:#1565c0}
</style>
</head>
<body>
<div class="box">
  <h2>出车审批</h2>
  <p>公司用车申请与审批系统</p>
  <div><label style="font-size:13px;color:#555;display:block;text-align:left;margin-bottom:4px">用户名</label><input type="text" id="u" placeholder="输入您的姓名"></div>
  <div><label style="font-size:13px;color:#555;display:block;text-align:left;margin-bottom:4px">角色</label><select id="r"><option value="">请选择</option><option value="applicant">用车申请人</option><option value="approver">审批人</option><option value="dispatcher">派车人</option><option value="admin">管理员</option></select></div>
  <div><label style="font-size:13px;color:#555;display:block;text-align:left;margin-bottom:4px">登录密码</label><input type="password" id="p" placeholder="默认: 123456"></div>
  <button onclick="login()">进入系统</button>
  <p style="font-size:11px;color:#aaa;margin-top:14px">默认密码: 123456</p>
</div>
<script>
function login(){
  var u=document.getElementById('u').value.trim();
  var r=document.getElementById('r').value;
  var p=document.getElementById('p').value;
  if(!u){alert('请输入用户名');return}
  if(!r){alert('请选择角色');return}
  var pw="123456";
  if(p!==pw){alert('密码错误');return}
  document.querySelector('.box').innerHTML='<h2 style="margin-bottom:8px">登录成功</h2><p>欢迎，'+u+'</p><p style="color:#888">角色: '+(r==="applicant"?"用车申请人":r==="approver"?"审批人":r==="dispatcher"?"派车人":"管理员")+'</p>';
}
</script>
</body>
</html>
